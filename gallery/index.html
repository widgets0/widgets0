<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Галерея виджетов</title>
<link rel="icon" type="image/png" href="../favicon.png">
<link rel="apple-touch-icon" href="../apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  :root{
    --accent:#1d1d1f;      /* цвет кнопок и активного фильтра */
    --on-accent:#ffffff;   /* текст на акценте */
    --bg:#f5f5f7;
    --ink:#1d1d1f;
    --muted:#6e6e73;
    --muted2:#86868b;
  }
  body{
    font-family:Onest,-apple-system,"Segoe UI",sans-serif;
    background:var(--bg);
    color:var(--ink);
    padding:80px 24px 110px;
  }
  .wrap{max-width:1180px;margin:0 auto}

  /* ---- Hero ---- */
  .hero{text-align:center;max-width:820px;margin:0 auto 52px}
  .eyebrow{
    display:inline-flex;align-items:center;gap:9px;padding:7px 15px;background:#fff;
    border:1px solid rgba(0,0,0,.1);border-radius:980px;font-size:13px;font-weight:600;
    letter-spacing:.01em;color:#4b4b4f;margin-bottom:28px;box-shadow:0 1px 2px rgba(0,0,0,.03);white-space:nowrap;
  }
  .eyebrow .dot{width:7px;height:7px;border-radius:50%;background:#30d158;box-shadow:0 0 0 3px rgba(48,209,88,.18)}
  .hero h1{font-size:66px;font-weight:700;line-height:1.03;letter-spacing:-.035em;margin:0 0 22px;text-wrap:balance}
  .hero h1 .dim{color:var(--muted2)}
  .hero p{font-size:21px;line-height:1.5;color:var(--muted);margin:0 auto;max-width:660px;text-wrap:pretty}

  /* ---- Stat + search ---- */
  .bar{
    display:flex;align-items:center;justify-content:space-between;gap:24px;background:#fff;
    border:1px solid rgba(0,0,0,.08);border-radius:18px;padding:20px 26px;margin-bottom:36px;box-shadow:0 1px 3px rgba(0,0,0,.04);
  }
  .bar .count{display:flex;align-items:baseline;gap:9px}
  .bar .count b{font-size:28px;font-weight:700;letter-spacing:-.01em}
  .bar .count span{color:var(--muted2);font-size:16px}
  .bar input{
    width:min(430px,48%);background:#f0f0f3;border:1px solid rgba(0,0,0,.09);border-radius:12px;
    padding:14px 18px;color:var(--ink);font-size:15px;font-family:inherit;outline:none;
  }
  .bar input::placeholder{color:var(--muted2)}

  /* ---- Filters ---- */
  .chips{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin-bottom:44px}
  .chip{
    padding:10px 20px;border-radius:980px;font-family:inherit;font-size:15px;font-weight:500;cursor:pointer;
    white-space:nowrap;transition:all .15s ease;border:1px solid rgba(0,0,0,.1);background:#fff;color:var(--ink);
  }
  .chip.active{background:var(--accent);color:var(--on-accent);border-color:transparent}

  /* ---- Grid + cards ---- */
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
  @media(max-width:980px){.grid{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:640px){.grid{grid-template-columns:1fr}.hero h1{font-size:46px}}
  .card{
    display:flex;flex-direction:column;background:#fff;border:1px solid rgba(0,0,0,.07);border-radius:22px;
    overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.05);transition:transform .2s ease, box-shadow .2s ease;
  }
  .card:hover{transform:translateY(-4px);box-shadow:0 18px 44px rgba(0,0,0,.13);border-color:rgba(0,0,0,.09)}
  .preview{position:relative;padding:26px;cursor:pointer;border-bottom:1px solid rgba(0,0,0,.06)}
  .badge{
    position:absolute;top:18px;left:22px;z-index:3;font-size:12px;font-weight:600;color:var(--ink);
    background:rgba(255,255,255,.82);backdrop-filter:blur(6px);border:1px solid rgba(0,0,0,.06);
    padding:5px 12px;border-radius:8px;pointer-events:none;
  }
  .frame{position:relative;height:300px;border-radius:16px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,.12);background:#fff}
  .frame iframe{width:200%;height:200%;border:0;transform:scale(.5);transform-origin:0 0;pointer-events:none}
  .frame .hit{position:absolute;inset:0}
  .body{padding:26px 26px 28px;display:flex;flex-direction:column;flex:1}
  .body h3{font-size:24px;font-weight:700;margin:0 0 18px;letter-spacing:-.01em}
  .label{font-size:11px;letter-spacing:.08em;font-weight:600;color:var(--muted2);margin-bottom:9px}
  .desc{font-size:16px;line-height:1.5;color:#424245;margin:0 0 20px}
  .label.who{border-top:1px solid rgba(0,0,0,.08);padding-top:18px;margin-bottom:12px}
  .tags{display:flex;flex-wrap:wrap;gap:8px;margin:0 0 26px}
  .tag{font-size:13px;color:#4b4b4f;background:#f0f0f3;border:1px solid rgba(0,0,0,.05);padding:5px 11px;border-radius:8px}
  .btn{
    margin-top:auto;width:100%;padding:15px;border-radius:980px;border:0;background:var(--accent);color:var(--on-accent);
    font-family:inherit;font-weight:600;font-size:16px;cursor:pointer;transition:all .15s ease;
  }
  .btn:hover{transform:translateY(-1px);box-shadow:0 10px 26px rgba(0,0,0,.18)}
  .empty{text-align:center;color:var(--muted);font-size:17px;padding:80px 20px}

  /* ---- Modal ---- */
  .overlay{
    position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(8px);display:none;
    align-items:center;justify-content:center;padding:32px;z-index:60;
  }
  .overlay.open{display:flex}
  .modal{
    width:min(1000px,100%);height:min(680px,90vh);background:#fff;border:1px solid rgba(0,0,0,.08);
    border-radius:20px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 40px 120px rgba(0,0,0,.3);
  }
  .modal .head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid rgba(0,0,0,.08)}
  .modal .head b{font-size:17px}
  .modal .head .act{display:flex;gap:12px;align-items:center}
  .modal .head a{text-decoration:none;color:var(--ink);font-size:14px;font-weight:600;padding:9px 16px;border:1px solid rgba(0,0,0,.14);border-radius:10px}
  .modal .head .close{width:38px;height:38px;border-radius:10px;border:1px solid rgba(0,0,0,.12);background:#f5f5f7;color:var(--ink);font-size:16px;cursor:pointer}
  .modal iframe{flex:1;border:0;width:100%;background:#fff}
</style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div class="eyebrow"><span class="dot"></span>13 готовых виджетов · ставятся без переделки сайта</div>
      <h1><span class="dim">Те же посетители — </span>больше заявок</h1>
      <p>Квизы, игры, калькуляторы и формы, которые вовлекают посетителей и отправляют заявки прямо в Telegram — без переделки сайта.</p>
    </div>

    <div class="bar">
      <div class="count"><b id="count">13</b><span>виджетов</span></div>
      <input id="search" placeholder="Поиск виджетов">
    </div>

    <div class="chips" id="chips"></div>
    <div class="grid" id="grid"></div>
    <div class="empty" id="empty" style="display:none">Ничего не найдено. Попробуй другой запрос или категорию.</div>
  </div>

  <div class="overlay" id="overlay">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="head">
        <b id="mTitle"></b>
        <div class="act">
          <a id="mLink" target="_blank" rel="noopener">Открыть виджет ↗</a>
          <button class="close" onclick="closeModal()">✕</button>
        </div>
      </div>
      <iframe id="mFrame" title="preview"></iframe>
    </div>
  </div>

<script>
const BASE = './';
const CATS = ['Все','Квиз','Игра','Розыгрыш','Калькулятор','Форма','Информер','Баннер'];

const WIDGETS = [
  {path:'widgets/wheel-fortune-widget.html?preview=1', title:'Колесо фортуны', category:'Розыгрыш',
   how:'Посетитель крутит колесо, выигрывает бонус и оставляет имя и телефон, чтобы его забрать.',
   who:'Салоны · кафе · магазины · локальные услуги'},
  {path:'widgets/tinder-product-widget.html?preview=swiping', title:'Товарный Тиндер', category:'Квиз',
   how:'Посетитель листает товары, отмечает что нравится — виджет собирает персональную подборку и контакт.',
   who:'Магазины одежды · спорт · бьюти · подарки'},
  {path:'widgets/cleaning-calculator-widget.html', title:'Калькулятор стоимости', category:'Калькулятор',
   how:'Посетитель сам считает примерную цену и оставляет контакт, чтобы получить точный расчёт.',
   who:'Клининг · ремонт · автоуслуги · услуги с вилкой цен'},
  {path:'widgets/quees.html?preview=question1', title:'Квиз', category:'Квиз',
   how:'Посетитель отвечает на вопросы, получает рекомендацию и оставляет контакт, чтобы забрать бонус.',
   who:'Школы · курсы · эксперты · образовательные воронки'},
  {path:'widgets/black-friday-timer-form-widget.html', title:'Форма с таймером', category:'Форма',
   how:'Таймер показывает, что предложение скоро закончится, и подталкивает оставить заявку сейчас.',
   who:'Акции · запуск курса · набор группы'},
  {path:'widgets/sale-banner-timer-widget.html', title:'Акционная полоса', category:'Баннер',
   how:'Заметная полоса сверху сайта показывает акцию, таймер и открывает форму заявки.',
   who:'Сезонные акции · скидки · распродажи · спецпредложения'},
  {path:'widgets/mobile-sale-card-widget.html?preview=1', title:'Мобильная акция', category:'Баннер',
   how:'Мобильная промо-карточка появляется снизу, показывает акцию и собирает заявку.',
   who:'Мобильный трафик · розыгрыши · скидки · быстрые заявки'},
  {path:'widgets/manicure-game-widget.html?preview=playing&static=1', title:'Игра-ловушка', category:'Игра',
   how:'Посетитель играет, выигрывает скидку и оставляет заявку, чтобы забрать приз.',
   who:'Акции · распродажи · салоны · локальные услуги'},
  {path:'widgets/purchase-counter-widget.html', title:'Счётчик посетителей', category:'Информер',
   how:'Показывает, сколько человек смотрят товар или уже купили, и создаёт ощущение спроса.',
   who:'Магазины · карточки товара · лендинги · страницы услуг'},
  {path:'widgets/bike-bonus-runner-widget.html?preview=playing', title:'Велоигра за бонусы', category:'Игра',
   how:'Посетитель управляет мини-игрой, собирает баллы и оставляет контакт, чтобы забрать выигрыш.',
   who:'Акции · доставка · магазины · молодая аудитория'},
  {path:'widgets/gif-contact-widget.html', title:'Форма с гифкой', category:'Форма',
   how:'Заметный блок с GIF открывает короткую форму для вопроса или заявки.',
   who:'Консультации · поддержка · услуги · экспертные сайты'},
  {path:'widgets/organic-lead-form-widget.html', title:'Арт-форма с бонусом', category:'Форма',
   how:'Форма с изображением и таймером предлагает бонус и собирает контакт.',
   who:'Обучение · услуги · премиальные офферы · консультации'},
  {path:'widgets/yandex-rating-widget.html', title:'Рейтинг на Яндекс Картах', category:'Информер',
   how:'Показывает рейтинг, количество отзывов и ведёт на страницу заведения в Яндекс Картах.',
   who:'Локальный бизнес · клиники · салоны · рестораны'},
];

let activeCat = 'Все';
let query = '';

const el = (id) => document.getElementById(id);
const esc = (s) => s.replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function renderChips(){
  el('chips').innerHTML = CATS.map(c =>
    `<button class="chip${c===activeCat?' active':''}" onclick="setCat('${c}')">${c}</button>`
  ).join('');
}

function setCat(c){ activeCat = c; renderChips(); renderGrid(); }

function renderGrid(){
  const q = query.trim().toLowerCase();
  const list = WIDGETS.filter(w =>
    (activeCat==='Все' || w.category===activeCat) &&
    (!q || (w.title+' '+w.how+' '+w.who).toLowerCase().includes(q))
  );
  el('grid').innerHTML = list.map(w => {
    const tags = w.who.split('·').map(s=>s.trim()).filter(Boolean)
      .map(t => `<span class="tag">${esc(t)}</span>`).join('');
    const url = BASE + w.path;
    return `
      <div class="card">
        <div class="preview" onclick="openModal('${esc(w.title)}','${url}')">
          <div class="badge">${esc(w.category)}</div>
          <div class="frame">
            <iframe src="${url}" loading="lazy" scrolling="no" title="${esc(w.title)}"></iframe>
            <div class="hit"></div>
          </div>
        </div>
        <div class="body">
          <h3>${esc(w.title)}</h3>
          <div class="label">КАК РАБОТАЕТ</div>
          <p class="desc">${esc(w.how)}</p>
          <div class="label who">КОМУ ПОДХОДИТ</div>
          <div class="tags">${tags}</div>
          <button class="btn" onclick="openModal('${esc(w.title)}','${url}')">Посмотреть виджет</button>
        </div>
      </div>`;
  }).join('');
  el('empty').style.display = list.length ? 'none' : 'block';
}

function openModal(title, url){
  el('mTitle').textContent = title;
  el('mLink').href = url;
  el('mFrame').src = url;
  el('overlay').classList.add('open');
}
function closeModal(){
  el('overlay').classList.remove('open');
  el('mFrame').src = 'about:blank';
}

el('overlay').addEventListener('click', closeModal);
el('search').addEventListener('input', e => { query = e.target.value; renderGrid(); });
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });

renderChips();
renderGrid();
</script>
</body>
</html>
