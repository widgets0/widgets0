        .no-scrollbar::-webkit-scrollbar {

        /* Apple-style анимации появления */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }

            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;

            pointer-events: none;

    <script>
        const defaultUserData = {

            company: "Detailing Pro",
            phone: "+7 (999) 123-45-67",

            email: "andrey@delta.com",

            websiteUrl: "https://delta.com",
            telegramUrl: "https://t.me/andrey_voronin",
            whatsappUrl: "https://wa.me/79991234567",
            viberUrl: "viber://chat?number=%2B79991234567",

            dzenUrl: "https://dzen.ru/id/0",
            avatarUrl: "https://images.unsplash.com/photo-1560250097-0b93528c311a?auto=format&fit=crop&q=80&w=400&h=400"
        };
        const userData = Object.assign({}, defaultUserData, window.BUSINESS_CARD_WIDGET_CONFIG || {});

        function setHref(selector, value) {
            const el = document.querySelector(selector);
            if (el && value) el.href = value;
        }

        function showToast(message) {
            const toast = document.getElementById('business-card-toast');
            if (!toast) return;
            const label = toast.querySelector('div');
            if (label) label.textContent = message;
            toast.classList.add('is-visible');
            clearTimeout(showToast.timer);
            showToast.timer = setTimeout(() => toast.classList.remove('is-visible'), 2200);
        }

        function updateCardFromConfig() {
            const fullName = `${userData.lastName} ${userData.firstName} ${userData.middleName}`.trim();
            const nameEl = document.querySelector('[data-card-name]');
            const titleEl = document.querySelector('[data-card-title]');
            const avatarEl = document.querySelector('[data-card-avatar]');
            const websiteEl = document.querySelector('[data-card-website]');
            const qrEl = document.querySelector('[data-card-qr]');

            if (nameEl) nameEl.innerHTML = `${userData.lastName} ${userData.firstName}<br/>${userData.middleName}`.trim();
            if (titleEl) titleEl.textContent = userData.title;
            if (avatarEl) {
                avatarEl.src = userData.avatarUrl;
                avatarEl.alt = fullName;
            }
            if (websiteEl) websiteEl.textContent = userData.website;

            setHref('[data-card-whatsapp]', userData.whatsappUrl);
            setHref('[data-card-telegram]', userData.telegramUrl);
            setHref('[data-card-website-link]', userData.websiteUrl);
            setHref('[data-card-viber]', userData.viberUrl);
            setHref('[data-card-vk]', userData.vkUrl);
            setHref('[data-card-dzen]', userData.dzenUrl);

            if (qrEl) {
                const qrTarget = window.location.href.split('#')[0];
                qrEl.src = 'https://api.qrserver.com/v1/create-qr-code/?size=220x220&margin=12&data=' + encodeURIComponent(qrTarget);
            }
        }

        // Генерация и скачивание контакта (vCard)
        function downloadVCard() {
            const vcard = `BEGIN:VCARD
VERSION:3.0
FN:${userData.lastName} ${userData.firstName} ${userData.middleName}
N:${userData.lastName};${userData.firstName};${userData.middleName};;
TITLE:${userData.title}
ORG:${userData.company}
TEL;TYPE=WORK,VOICE:${userData.phone}
EMAIL;TYPE=WORK,INTERNET:${userData.email}
URL:${userData.websiteUrl}
END:VCARD`;
            
            const blob = new Blob([vcard], { type: 'text/vcard' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `${userData.firstName}_${userData.lastName}.vcf`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        // Нативная функция "Поделиться" в iOS / Android
        async function shareContact() {
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: `${userData.firstName} ${userData.lastName} - ${userData.title}`,
                        text: `Визитная карточка: ${userData.firstName} ${userData.lastName}, ${userData.company}`,
                        url: window.location.href,
                    });
                } catch (err) {
                    console.log('Пользователь отменил или произошла ошибка:', err);
                }
            } else {
                const shareUrl = window.location.href.split('#')[0];
                try {
                    await navigator.clipboard.writeText(shareUrl);
                    showToast('Ссылка скопирована');
                } catch (err) {
                    showToast('Скопируйте ссылку из адресной строки');
                }
            }
        }

        // Открытие/закрытие модального окна с QR кодом
        function toggleQR(show) {
            const modal = document.getElementById('qr-modal');
            if (show) {
                modal.classList.remove('opacity-0', 'pointer-events-none');
                modal.classList.add('opacity-100');
            } else {
                modal.classList.add('opacity-0', 'pointer-events-none');
                modal.classList.remove('opacity-100');
            }
        }

        updateCardFromConfig();
    </script>
</body>
</html>
