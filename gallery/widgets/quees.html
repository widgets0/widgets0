<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Квиз: с чего начать в свечеварении</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at 20% 0%, rgba(255, 215, 137, .34), transparent 35%),
        radial-gradient(circle at 90% 85%, rgba(123, 92, 255, .14), transparent 34%),
        #f7f1e7;
      color: #261f1a;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    }

    .candle-quiz {
      width: min(440px, calc(100vw - 32px));
      border: 1px solid rgba(58, 45, 35, .14);
      border-radius: 28px;
      background: rgba(255, 252, 246, .92);
      box-shadow: 0 28px 80px rgba(55, 38, 20, .16);
      overflow: hidden;
    }

    .cq-top {
      min-height: 122px;
      padding: 24px 24px 20px;
      background:
        linear-gradient(135deg, rgba(83, 60, 40, .92), rgba(161, 116, 70, .74)),
        radial-gradient(circle at 15% 20%, rgba(255, 210, 124, .32), transparent 30%);
      color: #fff8ed;
      position: relative;
      overflow: hidden;
    }

    .cq-top::after {
      content: "";
      position: absolute;
      width: 140px;
      height: 140px;
      right: -46px;
      top: -48px;
      border-radius: 50%;
      background: rgba(255, 219, 154, .18);
    }

    .cq-kicker {
      margin: 0 0 10px;
      color: rgba(255, 248, 237, .72);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
      position: relative;
      z-index: 1;
    }

    .cq-title {
      margin: 0;
      max-width: 330px;
      font-size: 27px;
      line-height: 1.05;
      font-weight: 900;
      letter-spacing: -.03em;
      position: relative;
      z-index: 1;
    }

    .cq-body {
      padding: 24px;
    }

    .cq-screen {
      display: none;
      animation: cqFade .24s ease both;
    }

    .cq-screen.is-active {
      display: block;
    }

    .cq-text {
      margin: 0;
      color: #695e54;
      font-size: 16px;
      line-height: 1.5;
    }

    .cq-main-btn,
    .cq-option,
    .cq-submit,
    .cq-secondary {
      width: 100%;
      min-height: 52px;
      border: 0;
      border-radius: 14px;
      cursor: pointer;
      font: inherit;
      font-weight: 850;
      transition: transform .18s ease, box-shadow .18s ease, background .18s ease;
    }

    .cq-main-btn,
    .cq-submit {
      margin-top: 22px;
      background: #2b211a;
      color: #fff8ed;
      box-shadow: 0 14px 34px rgba(43, 33, 26, .24);
    }

    .cq-main-btn:hover,
    .cq-submit:hover,
    .cq-option:hover,
    .cq-secondary:hover {
      transform: translateY(-2px);
    }

    .cq-progress {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 18px;
      color: #8d8075;
      font-size: 13px;
      font-weight: 800;
    }

    .cq-bar {
      height: 8px;
      flex: 1;
      border-radius: 999px;
      background: #eee3d3;
      overflow: hidden;
    }

    .cq-bar span {
      display: block;
      width: 25%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #c58c45, #ffcf7a);
      transition: width .24s ease;
    }

    .cq-question-title,
    .cq-result-title {
      margin: 0 0 16px;
      font-size: 23px;
      line-height: 1.16;
      font-weight: 900;
      letter-spacing: -.02em;
    }

    .cq-options {
      display: grid;
      gap: 10px;
    }

    .cq-option {
      min-height: 60px;
      padding: 14px 16px;
      border: 1px solid rgba(58, 45, 35, .14);
      background: #fffaf2;
      color: #2e261f;
      text-align: left;
      line-height: 1.25;
      box-shadow: 0 8px 20px rgba(70, 48, 28, .07);
    }

    .cq-result-badge {
      display: inline-flex;
      margin-bottom: 12px;
      padding: 8px 12px;
      border-radius: 999px;
      background: #fff0cf;
      color: #8b5a19;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .cq-result-text,
    .cq-bonus {
      margin: 0;
      color: #685b50;
      font-size: 15px;
      line-height: 1.48;
    }

    .cq-bonus {
      margin-top: 14px;
      padding: 14px;
      border: 1px dashed rgba(145, 97, 35, .3);
      border-radius: 14px;
      background: #fff7e8;
      color: #49382b;
      font-weight: 700;
    }

    .cq-form {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    .cq-field {
      width: 100%;
      min-height: 50px;
      padding: 0 15px;
      border: 1px solid rgba(58, 45, 35, .16);
      border-radius: 14px;
      outline: 0;
      background: #fffaf2;
      color: #261f1a;
      font: inherit;
      font-weight: 700;
    }

    .cq-field:focus {
      border-color: rgba(197, 140, 69, .7);
      box-shadow: 0 0 0 4px rgba(197, 140, 69, .12);
    }

    .cq-consent {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      color: #6b6157;
      font-size: 13px;
      line-height: 1.35;
      font-weight: 700;
    }

    .cq-consent input {
      width: 18px;
      height: 18px;
      flex: 0 0 auto;
      accent-color: #2b211a;
      margin-top: 1px;
    }

    .cq-submit {
      margin-top: 2px;
    }

    .cq-submit:disabled {
      opacity: .65;
      cursor: wait;
      transform: none;
    }

    .cq-secondary {
      margin-top: 10px;
      background: #f0e6d8;
      color: #3b3027;
    }

    .cq-success {
      text-align: center;
      padding: 18px 0 6px;
    }

    .cq-success-icon {
      width: 70px;
      height: 70px;
      display: grid;
      place-items: center;
      margin: 0 auto 16px;
      border-radius: 50%;
      background: #e8f8df;
      color: #397222;
      font-size: 32px;
      font-weight: 900;
    }

    .cq-error {
      display: none;
      margin: 2px 0 0;
      color: #b42318;
      font-size: 13px;
      font-weight: 800;
    }

    .cq-error.is-visible {
      display: block;
    }

    @keyframes cqFade {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      body {
        padding: 12px;
      }

      .candle-quiz {
        width: min(100%, calc(100vw - 24px));
        border-radius: 22px;
      }

      .cq-top {
        min-height: 110px;
        padding: 20px 20px 18px;
      }

      .cq-title {
        font-size: 24px;
      }

      .cq-body {
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <!-- Начало кода виджета Квиз "С чего начать в свечеварении" -->
  <div class="candle-quiz" data-candle-quiz>
    <div class="cq-top">
      <p class="cq-kicker">Виджет-квиз</p>
      <h1 class="cq-title">С чего начать в свечеварении?</h1>
    </div>

    <div class="cq-body">
      <section class="cq-screen is-active" data-screen="intro">
        <p class="cq-text">Ответь на 4 вопроса — подберём формат, который подойдёт именно тебе, и дадим бонус на старт.</p>
        <button class="cq-main-btn" type="button" data-start>Пройти за 1 минуту</button>
      </section>

      <section class="cq-screen" data-screen="question">
        <div class="cq-progress">
          <span data-progress-label>1 / 4</span>
          <div class="cq-bar" aria-hidden="true"><span data-progress-bar></span></div>
        </div>
        <h2 class="cq-question-title" data-question-title></h2>
        <div class="cq-options" data-options></div>
      </section>

      <section class="cq-screen" data-screen="result">
        <div class="cq-result-badge" data-result-segment></div>
        <h2 class="cq-result-title" data-result-title></h2>
        <p class="cq-result-text" data-result-text></p>
        <p class="cq-bonus" data-result-bonus></p>

        <form class="cq-form" data-lead-form>
          <input class="cq-field" type="text" name="name" placeholder="Имя" autocomplete="name" required>
          <input class="cq-field" type="text" name="contact" placeholder="Telegram или телефон" autocomplete="tel" required>
          <label class="cq-consent">
            <input type="checkbox" name="consent" checked required>
            <span>Согласен(на) на обработку персональных данных</span>
          </label>
          <p class="cq-error" data-error></p>
          <button class="cq-submit" type="submit" data-submit>Получить рекомендацию и бонус</button>
        </form>
      </section>

      <section class="cq-screen cq-success" data-screen="success">
        <div class="cq-success-icon">✓</div>
        <h2 class="cq-result-title">Готово! Уже летит к тебе ✨</h2>
        <p class="cq-result-text">Скоро напишем в Telegram с твоей рекомендацией и бонусом. До встречи в Дневнике свечника!</p>
        <button class="cq-secondary" type="button" data-restart>Пройти ещё раз</button>
      </section>
    </div>
  </div>

  <script>
    (function() {
      const LEAD_CONFIG = {
        webhookUrl: 'https://widgets0-production.up.railway.app',
        widget: 'Квиз "С чего начать в свечеварении"',
        source: 'candles-quiz'
      };

      const params = new URLSearchParams(window.location.search);
      if (params.get('webhookUrl')) LEAD_CONFIG.webhookUrl = params.get('webhookUrl');
      if (params.get('source')) LEAD_CONFIG.source = params.get('source');

      const QUESTIONS = [
        {
          title: 'Делала ли ты свечи раньше?',
          options: [
            { text: 'Никогда, только мечтаю попробовать', score: 'Н' },
            { text: 'Пробовала пару раз для себя', score: 'Т' },
            { text: 'Уже делаю, хочу выйти на доход', score: 'М' }
          ]
        },
        {
          title: 'Что тебе ближе?',
          options: [
            { text: 'Хочу занятие для души и руками', score: 'Т' },
            { text: 'Хочу с нуля освоить и начать зарабатывать', score: 'Н' },
            { text: 'Хочу масштабировать то, что уже делаю', score: 'М' }
          ]
        },
        {
          title: 'Сколько времени готова уделять?',
          options: [
            { text: 'Пока просто попробовать, без обязательств', score: 'Н' },
            { text: 'Несколько часов в неделю в удовольствие', score: 'Т' },
            { text: 'Готова вложиться серьёзно, это мой бизнес', score: 'М' }
          ]
        },
        {
          title: 'Что для тебя важнее всего?',
          options: [
            { text: 'Получить первый красивый результат', score: 'Н' },
            { text: 'Творчество и спокойствие', score: 'Т' },
            { text: 'Стабильные продажи и клиенты', score: 'М' }
          ]
        }
      ];

      const RESULTS = {
        'Н': {
          segment: 'Новичок',
          title: 'Тебе подойдёт: Мастер-класс для новичка',
          text: 'Ты в самом начале — и это здорово. Начни с мастер-класса за 990 ₽: зальёшь первую свечу по проверенному рецепту, без тестов и испорченных материалов. Это мягкий вход, после которого станет понятно, твоё это или нет.',
          bonus: 'Оставь контакт — пришлём скидку на мастер-класс и чек-лист «что нужно для первой свечи».'
        },
        'Т': {
          segment: 'Творческий',
          title: 'Тебе подойдёт: тариф БАЗА',
          text: 'Тебе нужно не просто попробовать, а освоить разные виды изделий в своё удовольствие. Тариф БАЗА — это 14 модулей по производству плюс всё для старта, в комфортном темпе.',
          bonus: 'Оставь контакт — пришлём подборку «5 видов свечей, с которых приятно начать» и персональную скидку.'
        },
        'М': {
          segment: 'Мастер',
          title: 'Тебе подойдёт: тариф ВИП',
          text: 'Ты уже в теме и хочешь выйти на стабильный доход. Тебе нужна не теория, а работа с куратором над твоим проектом: продажи, продвижение, масштаб. ВИП — выбор большинства тех, кто пришёл за бизнесом.',
          bonus: 'Оставь контакт — пришлём разбор «3 причины, почему свечи не продаются» и спецусловие на тариф.'
        }
      };

      const root = document.querySelector('[data-candle-quiz]');
      if (!root) return;

      const screens = root.querySelectorAll('[data-screen]');
      const questionTitle = root.querySelector('[data-question-title]');
      const optionsWrap = root.querySelector('[data-options]');
      const progressLabel = root.querySelector('[data-progress-label]');
      const progressBar = root.querySelector('[data-progress-bar]');
      const resultSegment = root.querySelector('[data-result-segment]');
      const resultTitle = root.querySelector('[data-result-title]');
      const resultText = root.querySelector('[data-result-text]');
      const resultBonus = root.querySelector('[data-result-bonus]');
      const form = root.querySelector('[data-lead-form]');
      const submitBtn = root.querySelector('[data-submit]');
      const errorEl = root.querySelector('[data-error]');

      let step = 0;
      let answers = [];
      let resultKey = 'Н';
      let result = RESULTS[resultKey];

      function switchScreen(name) {
        screens.forEach(screen => {
          screen.classList.toggle('is-active', screen.dataset.screen === name);
        });
      }

      function renderQuestion() {
        const question = QUESTIONS[step];
        questionTitle.textContent = question.title;
        progressLabel.textContent = (step + 1) + ' / ' + QUESTIONS.length;
        progressBar.style.width = (((step + 1) / QUESTIONS.length) * 100) + '%';
        optionsWrap.innerHTML = '';

        question.options.forEach(option => {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'cq-option';
          btn.textContent = option.text;
          btn.addEventListener('click', () => {
            answers.push(option.score);
            step += 1;
            if (step >= QUESTIONS.length) {
              showResult();
            } else {
              renderQuestion();
            }
          });
          optionsWrap.appendChild(btn);
        });
      }

      function getResultKey() {
        const counts = { 'Н': 0, 'Т': 0, 'М': 0 };
        answers.forEach(answer => {
          counts[answer] = (counts[answer] || 0) + 1;
        });
        return ['Н', 'Т', 'М'].sort((a, b) => counts[b] - counts[a])[0];
      }

      function showResult() {
        resultKey = getResultKey();
        result = RESULTS[resultKey];
        resultSegment.textContent = result.segment;
        resultTitle.textContent = result.title;
        resultText.textContent = result.text;
        resultBonus.textContent = result.bonus;
        switchScreen('result');
      }

      function showError(message) {
        if (!errorEl) return;
        errorEl.textContent = message;
        errorEl.classList.add('is-visible');
      }

      function clearError() {
        if (!errorEl) return;
        errorEl.textContent = '';
        errorEl.classList.remove('is-visible');
      }

      root.querySelector('[data-start]').addEventListener('click', () => {
        step = 0;
        answers = [];
        renderQuestion();
        switchScreen('question');
      });

      root.querySelector('[data-restart]').addEventListener('click', () => {
        step = 0;
        answers = [];
        if (form) form.reset();
        const consent = form ? form.querySelector('[name="consent"]') : null;
        if (consent) consent.checked = true;
        clearError();
        switchScreen('intro');
      });

      if (form) {
        form.addEventListener('submit', async function(event) {
          event.preventDefault();
          clearError();

          const formData = new FormData(form);
          const name = String(formData.get('name') || '').trim();
          const contact = String(formData.get('contact') || '').trim();
          const consent = formData.get('consent') === 'on';

          if (!name || !contact) {
            showError('Укажи имя и Telegram или телефон.');
            return;
          }

          if (!consent) {
            showError('Нужно согласие на обработку персональных данных.');
            return;
          }

          const lead = {
            widget: LEAD_CONFIG.widget,
            source: LEAD_CONFIG.source,
            name,
            phone: contact,
            contact,
            'Результат квиза': result.segment,
            'Рекомендация': result.title,
            'Бонус': result.bonus,
            'Ответы': answers.join(', '),
            'Согласие на обработку персональных данных': 'Да',
            page: window.location.href.split('?')[0],
            createdAt: new Date().toISOString()
          };

          if (submitBtn) {
            submitBtn.disabled = true;
            submitBtn.textContent = 'Отправляем...';
          }

          try {
            const response = await fetch(LEAD_CONFIG.webhookUrl, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(lead)
            });

            if (!response.ok) {
              throw new Error('Webhook error: ' + response.status);
            }

            switchScreen('success');
          } catch (error) {
            console.error(error);
            showError('Не получилось отправить заявку. Попробуй ещё раз.');
          } finally {
            if (submitBtn) {
              submitBtn.disabled = false;
              submitBtn.textContent = 'Получить рекомендацию и бонус';
            }
          }
        });
      }

      if (params.get('preview') === 'question') {
        renderQuestion();
        switchScreen('question');
      }
    })();
  </script>
  <!-- Конец кода виджета Квиз "С чего начать в свечеварении" -->
</body>
</html>
