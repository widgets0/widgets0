<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Счётчик посетителей</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: #f7f8fb;
      color: #101828;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .counter-page-demo {
      width: min(100%, 760px);
      min-height: 360px;
      position: relative;
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: 28px;
      align-items: center;
      padding: clamp(22px, 4vw, 42px);
      border-radius: 28px;
      background: #ffffff;
      border: 1px solid #eceff4;
      box-shadow: 0 24px 70px rgba(15, 23, 42, 0.12);
      overflow: hidden;
    }

    .counter-product-image {
      min-height: 230px;
      border-radius: 22px;
      background:
        radial-gradient(circle at 68% 24%, rgba(236, 72, 153, 0.22), transparent 32%),
        radial-gradient(circle at 28% 72%, rgba(99, 102, 241, 0.2), transparent 34%),
        linear-gradient(135deg, #f5f7ff, #fff1f7);
      border: 1px solid #edf0f7;
    }

    .counter-product-copy {
      display: grid;
      gap: 14px;
    }

    .counter-product-kicker {
      width: 120px;
      height: 12px;
      border-radius: 99px;
      background: #ebeef5;
    }

    .counter-product-title {
      width: min(100%, 320px);
      height: 26px;
      border-radius: 99px;
      background: #dfe5ef;
    }

    .counter-product-line {
      height: 12px;
      border-radius: 99px;
      background: #eef1f6;
    }

    .counter-product-line:nth-child(4) {
      width: 82%;
    }

    .counter-product-button {
      width: 160px;
      height: 44px;
      margin-top: 10px;
      border-radius: 12px;
      background: #101828;
    }

    .purchase-counter {
      position: absolute;
      left: clamp(18px, 4vw, 36px);
      bottom: clamp(18px, 4vw, 34px);
      z-index: 2;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      width: fit-content;
      max-width: calc(100% - 36px);
      padding: 12px 38px 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(226, 232, 240, 0.95);
      background: rgba(255, 255, 255, 0.92);
      color: #334155;
      box-shadow: 0 16px 38px rgba(15, 23, 42, 0.16);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      font-size: 14px;
      font-weight: 600;
      line-height: 1.2;
      animation: fadeInUp 0.55s ease-out;
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.25s ease;
    }

    .purchase-counter:hover {
      transform: translateY(-2px);
      box-shadow: 0 20px 44px rgba(15, 23, 42, 0.19);
    }

    .purchase-counter.is-hidden {
      opacity: 0;
      pointer-events: none;
      transform: translateY(8px);
    }

    .counter-icon-wrap {
      position: relative;
      width: 30px;
      height: 30px;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      border-radius: 10px;
      background: #f4f0ff;
      color: #7c3aed;
    }

    .pulse-dot {
      position: absolute;
      right: -2px;
      top: -2px;
      width: 9px;
      height: 9px;
      background: #22c55e;
      border: 2px solid #ffffff;
      border-radius: 50%;
      box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.55);
      animation: pulse 2s infinite;
    }

    .eye-icon {
      width: 18px;
      height: 18px;
    }

    .purchase-counter strong {
      color: #7c3aed;
      font-weight: 800;
      font-size: 15px;
    }

    .counter-close {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 22px;
      height: 22px;
      display: grid;
      place-items: center;
      border: 0;
      border-radius: 8px;
      background: #f1f5f9;
      color: #64748b;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      transition: background 0.2s ease, color 0.2s ease;
    }

    .counter-close:hover {
      background: #e2e8f0;
      color: #0f172a;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.55); }
      70% { box-shadow: 0 0 0 8px rgba(34, 197, 94, 0); }
      100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
    }

    @media (max-width: 640px) {
      body {
        padding: 14px;
      }

      .counter-page-demo {
        min-height: 520px;
        grid-template-columns: 1fr;
        align-content: start;
        gap: 20px;
        padding: 20px;
        border-radius: 22px;
      }

      .counter-product-image {
        min-height: 230px;
      }

      .purchase-counter {
        left: 16px;
        right: 16px;
        bottom: 16px;
        max-width: none;
        font-size: 13px;
        padding: 12px 38px 12px 12px;
      }
    }
  </style>
</head>
<body>
  <div class="counter-page-demo">
    <div class="counter-product-image" aria-hidden="true"></div>
    <div class="counter-product-copy" aria-hidden="true">
      <div class="counter-product-kicker"></div>
      <div class="counter-product-title"></div>
      <div class="counter-product-line"></div>
      <div class="counter-product-line"></div>
      <div class="counter-product-line"></div>
      <div class="counter-product-button"></div>
    </div>

    <div class="purchase-counter" data-counter-min="24" data-counter-max="38">
      <div class="counter-icon-wrap">
        <div class="pulse-dot"></div>
        <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
          <circle cx="12" cy="12" r="3"></circle>
        </svg>
      </div>
      <span class="text">Уже купили: <strong data-counter-value>28</strong> человек</span>
      <button class="counter-close" type="button" aria-label="Закрыть">×</button>
    </div>
  </div>

  <script>
    (function () {
      const counters = document.querySelectorAll('.purchase-counter');

      counters.forEach((counter) => {
        const valueEl = counter.querySelector('[data-counter-value]');
        const closeBtn = counter.querySelector('.counter-close');
        if (!valueEl) return;

        const min = parseInt(counter.getAttribute('data-counter-min') || '24', 10);
        const max = parseInt(counter.getAttribute('data-counter-max') || '38', 10);
        let value = parseInt(valueEl.textContent || String(min), 10);

        function updateValue() {
          const next = Math.max(min, Math.min(max, value + (Math.random() > 0.35 ? 1 : -1)));
          value = next;
          valueEl.textContent = String(value);
        }

        const timer = setInterval(updateValue, 7000);

        if (closeBtn) {
          closeBtn.addEventListener('click', () => {
            clearInterval(timer);
            counter.classList.add('is-hidden');
            setTimeout(() => counter.remove(), 260);
          });
        }
      });
    })();
  </script>
</body>
</html>
