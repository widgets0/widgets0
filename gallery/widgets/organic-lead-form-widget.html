<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Арт-форма с бонусом</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;650;750;850&display=swap');

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px;
      background: #f4f2ed;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #151515;
    }

    .organic-lead-widget {
      width: min(100%, 1060px);
      position: relative;
      padding: clamp(34px, 6vw, 74px);
      border: 2px solid #1a1a1a;
      background:
        radial-gradient(circle at 72% 8%, rgba(18, 18, 18, 0.08), transparent 0 15%, transparent 18%),
        linear-gradient(120deg, #fffdf8 0 55%, #edf1ed 55% 100%);
      box-shadow: 0 24px 60px rgba(24, 21, 16, 0.14);
      overflow: hidden;
      isolation: isolate;
    }

    .organic-lead-badge {
      position: absolute;
      left: 50%;
      top: 0;
      z-index: 4;
      min-width: 260px;
      padding: 16px 28px;
      border-radius: 999px;
      background: #ffd84d;
      color: #111111;
      text-align: center;
      text-transform: uppercase;
      font-size: 18px;
      font-weight: 850;
      transform: translate(-50%, -50%);
      box-shadow: 0 14px 28px rgba(114, 89, 12, 0.14);
    }

    .organic-lead-inner {
      min-height: 430px;
      display: grid;
      grid-template-columns: minmax(260px, 0.92fr) minmax(360px, 1.08fr);
      gap: clamp(28px, 5vw, 76px);
      align-items: center;
      position: relative;
      z-index: 2;
    }

    .organic-lead-copy {
      max-width: 380px;
    }

    .organic-lead-kicker {
      display: inline-flex;
      margin-bottom: 18px;
      padding: 8px 12px;
      border: 1px solid rgba(21, 21, 21, 0.18);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.66);
      color: #5b564d;
      font-size: 12px;
      font-weight: 850;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .organic-lead-title {
      margin: 0 0 14px;
      font-size: clamp(34px, 5vw, 54px);
      line-height: 0.98;
      letter-spacing: 0;
      font-weight: 850;
    }

    .organic-lead-text {
      margin: 0 0 20px;
      color: #56504a;
      font-size: 16px;
      line-height: 1.55;
      font-weight: 650;
    }

    .organic-lead-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 22px;
    }

    .organic-lead-pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 34px;
      padding: 0 12px;
      border-radius: 999px;
      background: #151515;
      color: #ffffff;
      font-size: 13px;
      font-weight: 750;
      font-variant-numeric: tabular-nums;
    }

    .organic-lead-pill.is-light {
      background: #ece7dc;
      color: #302b25;
    }

    .organic-lead-form {
      display: grid;
      gap: 11px;
      max-width: 310px;
    }

    .organic-lead-field {
      width: 100%;
      height: 48px;
      border: 0;
      border-bottom: 2px solid #bdb8ad;
      border-radius: 0;
      padding: 0;
      background: transparent;
      color: #151515;
      font: inherit;
      font-size: 14px;
      font-weight: 650;
      outline: none;
    }

    .organic-lead-field:focus {
      border-color: #151515;
    }

    .organic-lead-field::placeholder {
      color: #9a948b;
    }

    .organic-lead-consent {
      display: flex;
      align-items: flex-start;
      gap: 9px;
      margin: 4px 0 2px;
      color: #6c665e;
      font-size: 11px;
      line-height: 1.35;
      font-weight: 650;
    }

    .organic-lead-consent input {
      width: 16px;
      height: 16px;
      margin: 0;
      accent-color: #151515;
      flex: 0 0 auto;
    }

    .organic-lead-error {
      min-height: 16px;
      color: #c43824;
      font-size: 12px;
      font-weight: 750;
    }

    .organic-lead-submit {
      width: 100%;
      min-height: 48px;
      border: 2px solid #151515;
      border-radius: 0;
      background: #151515;
      color: #ffffff;
      font: inherit;
      font-size: 13px;
      font-weight: 850;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease, color 0.2s ease;
    }

    .organic-lead-submit:hover {
      transform: translateY(-2px);
      background: transparent;
      color: #151515;
    }

    .organic-lead-visual {
      position: relative;
      min-height: 430px;
    }

    .organic-lead-image {
      position: absolute;
      inset: -34px -58px -38px 0;
      background:
        linear-gradient(90deg, rgba(255,255,255,0.28), transparent 32%),
        url("https://images.unsplash.com/photo-1497366754035-f200968a6e72?auto=format&fit=crop&w=1100&q=82") center / cover;
      clip-path: polygon(11% 4%, 28% 0, 42% 7%, 58% 1%, 78% 10%, 92% 27%, 86% 47%, 98% 65%, 84% 89%, 61% 84%, 43% 100%, 24% 88%, 6% 94%, 14% 66%, 0 47%, 9% 28%);
      filter: saturate(0.92) contrast(1.03);
    }

    .organic-lead-brush {
      position: absolute;
      right: -38px;
      bottom: -24px;
      width: min(74%, 460px);
      height: 120px;
      background: #fffdf8;
      transform: rotate(-7deg);
      clip-path: polygon(0 42%, 10% 18%, 24% 28%, 38% 10%, 53% 34%, 70% 6%, 88% 26%, 100% 16%, 100% 78%, 86% 70%, 74% 92%, 58% 72%, 43% 96%, 26% 76%, 12% 92%, 0 80%);
    }

    .organic-lead-line {
      position: absolute;
      inset: 14px;
      border: 2px solid rgba(21, 21, 21, 0.76);
      pointer-events: none;
      z-index: 1;
    }

    .organic-lead-success {
      position: fixed;
      left: 50%;
      top: 50%;
      z-index: 20;
      width: min(calc(100% - 36px), 340px);
      display: none;
      padding: 24px;
      border: 2px solid #151515;
      background: #fffdf8;
      color: #151515;
      text-align: center;
      box-shadow: 10px 12px 0 rgba(21, 21, 21, 0.16);
      transform: translate(-50%, -50%);
    }

    .organic-lead-success.is-open {
      display: block;
      animation: organicPop 0.22s ease-out;
    }

    .organic-lead-success h2 {
      margin: 0 0 8px;
      font-size: 24px;
      line-height: 1.1;
    }

    .organic-lead-success p {
      margin: 0;
      color: #615b52;
      font-size: 14px;
      line-height: 1.45;
      font-weight: 650;
    }

    @keyframes organicPop {
      from { opacity: 0; transform: translate(-50%, -48%) scale(0.96); }
      to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    }

    @media (max-width: 820px) {
      body {
        padding: 18px;
      }

      .organic-lead-widget {
        padding: 54px 22px 24px;
      }

      .organic-lead-badge {
        min-width: 220px;
        padding: 13px 20px;
        font-size: 15px;
      }

      .organic-lead-inner {
        min-height: 0;
        grid-template-columns: 1fr;
        gap: 24px;
      }

      .organic-lead-copy {
        max-width: none;
        order: 2;
      }

      .organic-lead-visual {
        min-height: 270px;
        order: 1;
      }

      .organic-lead-image {
        inset: -8px -28px -8px 10px;
      }

      .organic-lead-form {
        max-width: none;
      }
    }
  </style>
</head>
<body>
  <section class="organic-lead-widget" data-organic-widget data-duration-minutes="180" data-places="7">
    <div class="organic-lead-line"></div>
    <div class="organic-lead-badge">Закрытый бонус</div>

    <div class="organic-lead-inner">
      <div class="organic-lead-copy">
        <span class="organic-lead-kicker">Лимитированное предложение</span>
        <h1 class="organic-lead-title">Заберите подарок до конца дня</h1>
        <p class="organic-lead-text">Оставьте контакты, и мы отправим персональное предложение вместе с бонусом для новых клиентов.</p>

        <div class="organic-lead-meta">
          <span class="organic-lead-pill">До конца: <strong data-organic-timer>03:00:00</strong></span>
          <span class="organic-lead-pill is-light">Осталось мест: <strong data-organic-places>7</strong></span>
        </div>

        <form class="organic-lead-form" data-organic-form>
          <input class="organic-lead-field" type="text" name="name" placeholder="Ваше имя" autocomplete="name" required>
          <input class="organic-lead-field" type="tel" name="phone" placeholder="+7 (999) 999-99-99" autocomplete="tel" inputmode="tel" required>
          <label class="organic-lead-consent">
            <input type="checkbox" name="consent" checked required>
            <span>Согласен(на) на обработку персональных данных</span>
          </label>
          <div class="organic-lead-error" data-organic-error aria-live="polite"></div>
          <button class="organic-lead-submit" type="submit">Получить бонус</button>
        </form>
      </div>

      <div class="organic-lead-visual" aria-hidden="true">
        <div class="organic-lead-image"></div>
        <div class="organic-lead-brush"></div>
      </div>
    </div>
  </section>

  <div class="organic-lead-success" data-organic-success role="status" aria-live="polite">
    <h2>Спасибо за заявку!</h2>
    <p>Мы получили ваши контакты и скоро свяжемся с вами.</p>
  </div>

  <script>
    (function () {
      const LEAD_CONFIG = {
        webhookUrl: "https://widgets0-production.up.railway.app",
        widget: "Арт-форма с бонусом",
        source: "organic-lead-form"
      };

      const widget = document.querySelector('[data-organic-widget]');
      const form = document.querySelector('[data-organic-form]');
      const timerEl = document.querySelector('[data-organic-timer]');
      const placesEl = document.querySelector('[data-organic-places]');
      const errorEl = document.querySelector('[data-organic-error]');
      const successEl = document.querySelector('[data-organic-success]');
      const durationMinutes = parseInt(widget.getAttribute('data-duration-minutes') || '180', 10);
      const places = parseInt(widget.getAttribute('data-places') || '7', 10);
      const deadline = new Date(Date.now() + (Number.isNaN(durationMinutes) ? 180 : durationMinutes) * 60 * 1000);

      function pad(value) {
        return value < 10 ? '0' + value : String(value);
      }

      function updateTimer() {
        let diff = Math.max(0, deadline - new Date());
        const hours = Math.floor(diff / 3600000);
        diff -= hours * 3600000;
        const minutes = Math.floor(diff / 60000);
        diff -= minutes * 60000;
        const seconds = Math.floor(diff / 1000);
        timerEl.textContent = `${pad(hours)}:${pad(minutes)}:${pad(seconds)}`;
      }

      function formatPhone(value) {
        const digits = value.replace(/\D/g, '').replace(/^8/, '7').slice(0, 11);
        const normalized = digits.startsWith('7') ? digits : '7' + digits;
        const parts = normalized.slice(1);
        let result = '+7';
        if (parts.length > 0) result += ' (' + parts.slice(0, 3);
        if (parts.length >= 3) result += ')';
        if (parts.length > 3) result += ' ' + parts.slice(3, 6);
        if (parts.length > 6) result += '-' + parts.slice(6, 8);
        if (parts.length > 8) result += '-' + parts.slice(8, 10);
        return result;
      }

      updateTimer();
      setInterval(updateTimer, 1000);
      placesEl.textContent = Number.isNaN(places) ? '7' : String(places);

      form.elements.phone.addEventListener('input', function () {
        form.elements.phone.value = formatPhone(form.elements.phone.value);
      });

      form.addEventListener('submit', async function (event) {
        event.preventDefault();
        const submitBtn = form.querySelector('.organic-lead-submit');
        const name = form.elements.name.value.trim();
        const phone = form.elements.phone.value.trim();
        const consent = form.elements.consent.checked;

        if (!name || phone.replace(/\D/g, '').length !== 11) {
          errorEl.textContent = 'Введите имя и полный номер телефона.';
          return;
        }

        if (!consent) {
          errorEl.textContent = 'Нужно согласие на обработку персональных данных.';
          return;
        }

        errorEl.textContent = '';
        submitBtn.disabled = true;
        submitBtn.textContent = 'Отправляем...';

        try {
          const response = await fetch(LEAD_CONFIG.webhookUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              widget: LEAD_CONFIG.widget,
              source: LEAD_CONFIG.source,
              name,
              phone,
              'Оффер': 'Закрытый бонус до конца дня',
              'Осталось по таймеру': timerEl.textContent,
              'Осталось мест': placesEl.textContent,
              'Согласие на обработку персональных данных': 'Да',
              page: window.location.href.split('?')[0],
              createdAt: new Date().toISOString()
            })
          });

          if (!response.ok) throw new Error('Webhook error');

          successEl.classList.add('is-open');
          form.reset();
          form.elements.consent.checked = true;
          setTimeout(function () {
            successEl.classList.remove('is-open');
          }, 4500);
          submitBtn.disabled = false;
          submitBtn.textContent = 'Получить бонус';
        } catch (error) {
          errorEl.textContent = 'Не получилось отправить заявку. Попробуйте ещё раз.';
          submitBtn.disabled = false;
          submitBtn.textContent = 'Получить бонус';
        }
      });
    })();
  </script>
</body>
</html>
