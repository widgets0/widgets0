<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Рейтинг на Яндекс Картах</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: #ffffff;
      color: #111111;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }

    .yr-demo-page {
      width: min(100%, 780px);
      min-height: 720px;
      display: grid;
      place-items: center;
      padding: clamp(16px, 4vw, 48px);
      background: #ffffff;
    }

    .yr-widget {
      --yr-yellow: #ffd100;
      --yr-black: #191919;
      --yr-gray: #72757d;
      --yr-blue: #064bb7;
      width: min(100%, 460px);
      display: block;
      color: inherit;
      text-decoration: none;
      outline: none;
    }

    .yr-badge {
      position: relative;
      min-height: 650px;
      display: grid;
      place-items: center;
      padding: 46px 42px 82px;
      filter: drop-shadow(0 22px 34px rgba(0, 0, 0, 0.16));
      transition: transform 0.22s ease, filter 0.22s ease;
    }

    .yr-widget:hover .yr-badge,
    .yr-widget:focus-visible .yr-badge {
      transform: translateY(-3px);
      filter: drop-shadow(0 28px 42px rgba(0, 0, 0, 0.18));
    }

    .yr-shield-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: visible;
      pointer-events: none;
    }

    .yr-shield-white {
      filter: drop-shadow(0 0 34px rgba(0,0,0,0.08));
    }

    .yr-content {
      position: relative;
      z-index: 2;
      width: 100%;
      display: grid;
      justify-items: center;
      text-align: center;
      padding-top: 0;
    }

    .yr-map-icon {
      width: 108px;
      height: 108px;
      display: grid;
      place-items: center;
      margin: 0 auto 32px;
      border-radius: 28px;
      background: #ffffff;
      box-shadow:
        0 18px 34px rgba(0, 0, 0, 0.14),
        inset 0 1px 0 rgba(255, 255, 255, 0.9);
    }

    .yr-map-pin {
      width: 56px;
      height: 70px;
      display: block;
      filter: drop-shadow(0 10px 18px rgba(239, 45, 38, 0.2));
    }

    .yr-rating {
      margin: 0;
      color: #111111;
      font-size: clamp(104px, 22vw, 148px);
      line-height: 0.76;
      font-weight: 1000;
      letter-spacing: -0.1em;
      text-shadow:
        0 2px 0 rgba(255, 255, 255, 0.8),
        0 14px 20px rgba(0, 0, 0, 0.15);
    }

    .yr-stars {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 40px 0 30px;
      color: var(--yr-yellow);
      filter: drop-shadow(0 6px 12px rgba(255, 209, 0, 0.28));
    }

    .yr-stars svg {
      width: clamp(36px, 8vw, 46px);
      height: clamp(36px, 8vw, 46px);
      flex: 0 0 auto;
    }

    .yr-source {
      color: #111111;
      font-size: clamp(32px, 7vw, 47px);
      line-height: 1.08;
      font-weight: 900;
      letter-spacing: -0.04em;
      text-shadow: 0 8px 14px rgba(0, 0, 0, 0.11);
    }

    .yr-reviews {
      width: min(100%, 320px);
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 18px;
      align-items: center;
      margin: 18px 0 22px;
      color: var(--yr-gray);
      font-size: clamp(24px, 5vw, 32px);
      line-height: 1;
      font-weight: 850;
      letter-spacing: 0.04em;
    }

    .yr-reviews::before,
    .yr-reviews::after {
      content: "";
      height: 3px;
      border-radius: 999px;
      background: #d7d7d7;
    }

    .yr-divider {
      width: min(100%, 320px);
      height: 3px;
      margin: 0 0 14px;
      border-radius: 999px;
      background: #d9d9d9;
    }

    .yr-place {
      max-width: 100%;
      color: var(--yr-blue);
      font-size: clamp(32px, 7.5vw, 46px);
      line-height: 0.95;
      font-weight: 950;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-shadow:
        0 2px 0 rgba(255, 255, 255, 0.9),
        0 9px 18px rgba(6, 75, 183, 0.18);
      white-space: nowrap;
      transform: translateY(-4px);
    }

    @media (max-width: 520px) {
      body {
        padding: 10px;
      }

      .yr-demo-page {
        min-height: 620px;
        padding: 8px;
      }

      .yr-badge {
        min-height: 600px;
        padding: 40px 34px 74px;
      }

      .yr-map-icon {
        width: 92px;
        height: 92px;
        margin-bottom: 30px;
      }

      .yr-place {
        letter-spacing: 0.08em;
      }
    }
  </style>
</head>
<body>
  <main class="yr-demo-page">
    <!-- Начало кода виджета "Рейтинг на Яндекс Картах" -->
    <a class="yr-widget" href="https://yandex.ru/maps/?text=Samsung" target="_blank" rel="noopener" data-yr-widget>
      <div class="yr-badge">
        <svg class="yr-shield-svg" viewBox="0 0 460 650" aria-hidden="true" preserveAspectRatio="none">
          <defs>
            <linearGradient id="yrWhiteSurface" x1="0" x2="0" y1="0" y2="1">
              <stop offset="0" stop-color="#ffffff"/>
              <stop offset="0.54" stop-color="#fbfbfa"/>
              <stop offset="1" stop-color="#ffffff"/>
            </linearGradient>
            <radialGradient id="yrTopGlow" cx="50%" cy="17%" r="55%">
              <stop offset="0" stop-color="#ffffff" stop-opacity="0.96"/>
              <stop offset="0.52" stop-color="#ffffff" stop-opacity="0.22"/>
              <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
            </radialGradient>
          </defs>
          <path fill="#ffd100" d="M230 18 C244 18 381 67 407 81 C431 94 444 111 444 136 L444 500 C444 529 429 552 402 565 L253 636 C239 643 221 643 207 636 L58 565 C31 552 16 529 16 500 L16 136 C16 111 29 94 53 81 L207 22 C214 19 222 18 230 18 Z"/>
          <path fill="#191919" d="M230 42 C242 42 364 86 388 98 C409 109 420 124 420 146 L420 486 C420 512 407 532 383 544 L251 607 C238 613 222 613 209 607 L77 544 C53 532 40 512 40 486 L40 146 C40 124 51 109 72 98 L209 46 C216 43 223 42 230 42 Z"/>
          <path class="yr-shield-white" fill="url(#yrWhiteSurface)" d="M230 67 C240 67 348 106 369 117 C387 127 396 140 396 159 L396 478 C396 503 384 525 362 536 L251 601 C238 609 222 609 209 601 L98 536 C76 525 64 503 64 478 L64 159 C64 140 73 127 91 117 L211 70 C217 68 224 67 230 67 Z"/>
          <path fill="url(#yrTopGlow)" d="M230 67 C240 67 348 106 369 117 C387 127 396 140 396 159 L396 478 C396 503 384 525 362 536 L251 601 C238 609 222 609 209 601 L98 536 C76 525 64 503 64 478 L64 159 C64 140 73 127 91 117 L211 70 C217 68 224 67 230 67 Z"/>
        </svg>
        <div class="yr-content">
          <div class="yr-map-icon" aria-label="Яндекс Карты">
            <svg class="yr-map-pin" viewBox="0 0 64 80" aria-hidden="true">
              <path fill="#ff2f27" d="M32 0C14.33 0 0 14.05 0 31.39c0 21.34 25.23 33.6 29.46 46.29.77 2.31 4.31 2.31 5.08 0C38.77 64.99 64 52.73 64 31.39 64 14.05 49.67 0 32 0z"/>
              <circle cx="32" cy="30" r="12.5" fill="#fff"/>
            </svg>
          </div>
          <p class="yr-rating" data-yr-rating>4,8</p>
          <div class="yr-stars" aria-label="Рейтинг 4,8 из 5">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 1.8l3.09 6.27 6.92 1.01-5.01 4.88 1.18 6.9L12 17.6l-6.18 3.26 1.18-6.9-5.01-4.88 6.92-1.01L12 1.8z"/></svg>
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 1.8l3.09 6.27 6.92 1.01-5.01 4.88 1.18 6.9L12 17.6l-6.18 3.26 1.18-6.9-5.01-4.88 6.92-1.01L12 1.8z"/></svg>
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 1.8l3.09 6.27 6.92 1.01-5.01 4.88 1.18 6.9L12 17.6l-6.18 3.26 1.18-6.9-5.01-4.88 6.92-1.01L12 1.8z"/></svg>
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 1.8l3.09 6.27 6.92 1.01-5.01 4.88 1.18 6.9L12 17.6l-6.18 3.26 1.18-6.9-5.01-4.88 6.92-1.01L12 1.8z"/></svg>
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 1.8l3.09 6.27 6.92 1.01-5.01 4.88 1.18 6.9L12 17.6l-6.18 3.26 1.18-6.9-5.01-4.88 6.92-1.01L12 1.8z"/></svg>
          </div>
          <div class="yr-source">Яндекс Карты</div>
          <div class="yr-reviews"><span><span data-yr-reviews>1 248</span> отзывов</span></div>
          <div class="yr-divider" aria-hidden="true"></div>
          <span class="yr-place" data-yr-place>Samsung</span>
        </div>
      </div>
    </a>

    <script>
      (function () {
        const YANDEX_RATING_CONFIG = {
          rating: '4,8',
          reviewsCount: '1 248',
          placeName: 'Samsung',
          yandexMapsUrl: 'https://yandex.ru/maps/?text=Samsung'
        };

        const widget = document.querySelector('[data-yr-widget]');
        if (!widget) return;

        const ratingEl = widget.querySelector('[data-yr-rating]');
        const reviewsEl = widget.querySelector('[data-yr-reviews]');
        const placeEl = widget.querySelector('[data-yr-place]');
        const starsEl = widget.querySelector('.yr-stars');

        widget.href = YANDEX_RATING_CONFIG.yandexMapsUrl;
        if (ratingEl) ratingEl.textContent = YANDEX_RATING_CONFIG.rating;
        if (reviewsEl) reviewsEl.textContent = YANDEX_RATING_CONFIG.reviewsCount;
        if (placeEl) placeEl.textContent = YANDEX_RATING_CONFIG.placeName;
        if (starsEl) starsEl.setAttribute('aria-label', 'Рейтинг ' + YANDEX_RATING_CONFIG.rating + ' из 5');
      })();
    </script>
    <!-- Конец кода виджета "Рейтинг на Яндекс Картах" -->
  </main>
</body>
</html>
