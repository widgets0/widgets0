<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Рейтинг на Яндекс Картах</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: #ffffff;
      color: #111111;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }

    .yr-demo-page {
      width: min(100%, 760px);
      min-height: 680px;
      display: grid;
      place-items: center;
      padding: clamp(14px, 4vw, 46px);
      background: #ffffff;
    }

    .yr-widget {
      --yr-yellow: #ffd100;
      --yr-black: #171717;
      --yr-gray: #737780;
      --yr-blue: #064bb7;
      width: min(100%, 430px);
      display: block;
      color: inherit;
      text-decoration: none;
      outline: none;
    }

    .yr-badge {
      display: grid;
      padding: 18px;
      border-radius: 46px;
      background: var(--yr-yellow);
      box-shadow:
        0 24px 46px rgba(0, 0, 0, 0.14),
        0 0 0 1px rgba(255, 209, 0, 0.34);
      transition: transform 0.22s ease, box-shadow 0.22s ease;
    }

    .yr-widget:hover .yr-badge,
    .yr-widget:focus-visible .yr-badge {
      transform: translateY(-3px);
      box-shadow:
        0 30px 58px rgba(0, 0, 0, 0.17),
        0 0 0 1px rgba(255, 209, 0, 0.44);
    }

    .yr-card {
      display: grid;
      justify-items: center;
      text-align: center;
      min-height: 586px;
      padding: 36px 28px 38px;
      border: 13px solid var(--yr-black);
      border-radius: 34px;
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 1), transparent 32%),
        linear-gradient(180deg, #ffffff 0%, #fbfbfb 56%, #ffffff 100%);
      box-shadow:
        inset 0 0 0 2px rgba(255, 255, 255, 0.72),
        inset 0 0 34px rgba(0, 0, 0, 0.045);
    }

    .yr-map-icon {
      width: 100px;
      height: 100px;
      display: grid;
      place-items: center;
      margin: 0 auto 26px;
      border-radius: 28px;
      background: #ffffff;
      box-shadow:
        0 18px 34px rgba(0, 0, 0, 0.14),
        inset 0 1px 0 rgba(255, 255, 255, 0.9);
    }

    .yr-map-pin {
      width: 55px;
      height: 69px;
      display: block;
      filter: drop-shadow(0 10px 18px rgba(239, 45, 38, 0.2));
    }

    .yr-rating {
      margin: 0;
      color: #111111;
      font-size: clamp(94px, 21vw, 134px);
      line-height: 0.78;
      font-weight: 1000;
      letter-spacing: -0.1em;
      text-shadow:
        0 2px 0 rgba(255, 255, 255, 0.8),
        0 14px 20px rgba(0, 0, 0, 0.15);
    }

    .yr-stars {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin: 34px 0 28px;
      color: var(--yr-yellow);
      filter: drop-shadow(0 6px 12px rgba(255, 209, 0, 0.28));
    }

    .yr-stars svg {
      width: clamp(34px, 7.5vw, 42px);
      height: clamp(34px, 7.5vw, 42px);
      flex: 0 0 auto;
    }

    .yr-source {
      color: #111111;
      font-size: clamp(30px, 6.7vw, 42px);
      line-height: 1.08;
      font-weight: 900;
      letter-spacing: -0.04em;
      text-shadow: 0 8px 14px rgba(0, 0, 0, 0.11);
    }

    .yr-reviews {
      width: min(100%, 320px);
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 16px;
      align-items: center;
      margin: 18px 0 24px;
      color: var(--yr-gray);
      font-size: clamp(23px, 5vw, 30px);
      line-height: 1;
      font-weight: 850;
      letter-spacing: 0.04em;
    }

    .yr-reviews::before,
    .yr-reviews::after {
      content: "";
      height: 3px;
      border-radius: 999px;
      background: #d7d7d7;
    }

    .yr-divider {
      width: min(100%, 320px);
      height: 3px;
      margin: 0 0 22px;
      border-radius: 999px;
      background: #d9d9d9;
    }

    .yr-place {
      max-width: 100%;
      color: var(--yr-blue);
      font-size: clamp(32px, 7.5vw, 46px);
      line-height: 0.95;
      font-weight: 950;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-shadow:
        0 2px 0 rgba(255, 255, 255, 0.9),
        0 9px 18px rgba(6, 75, 183, 0.18);
      white-space: nowrap;
    }

    @media (max-width: 520px) {
      body {
        padding: 10px;
      }

      .yr-demo-page {
        min-height: 620px;
        padding: 8px;
      }

      .yr-badge {
        padding: 14px;
        border-radius: 38px;
      }

      .yr-card {
        min-height: 548px;
        padding: 30px 22px 32px;
        border-width: 11px;
        border-radius: 28px;
      }

      .yr-map-icon {
        width: 88px;
        height: 88px;
        margin-bottom: 24px;
      }

      .yr-place {
        letter-spacing: 0.08em;
      }
    }
  </style>
</head>
<body>
  <main class="yr-demo-page">
    <!-- Начало кода виджета "Рейтинг на Яндекс Картах" -->
    <a class="yr-widget" href="https://yandex.ru/maps/?text=Samsung" target="_blank" rel="noopener" data-yr-widget>
      <div class="yr-badge">
        <div class="yr-card">
          <div class="yr-map-icon" aria-label="Яндекс Карты">
            <svg class="yr-map-pin" viewBox="0 0 64 80" aria-hidden="true">
              <path fill="#ff2f27" d="M32 0C14.33 0 0 14.05 0 31.39c0 21.34 25.23 33.6 29.46 46.29.77 2.31 4.31 2.31 5.08 0C38.77 64.99 64 52.73 64 31.39 64 14.05 49.67 0 32 0z"/>
              <circle cx="32" cy="30" r="12.5" fill="#fff"/>
            </svg>
          </div>
          <p class="yr-rating" data-yr-rating>4,8</p>
          <div class="yr-stars" aria-label="Рейтинг 4,8 из 5">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 1.8l3.09 6.27 6.92 1.01-5.01 4.88 1.18 6.9L12 17.6l-6.18 3.26 1.18-6.9-5.01-4.88 6.92-1.01L12 1.8z"/></svg>
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 1.8l3.09 6.27 6.92 1.01-5.01 4.88 1.18 6.9L12 17.6l-6.18 3.26 1.18-6.9-5.01-4.88 6.92-1.01L12 1.8z"/></svg>
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 1.8l3.09 6.27 6.92 1.01-5.01 4.88 1.18 6.9L12 17.6l-6.18 3.26 1.18-6.9-5.01-4.88 6.92-1.01L12 1.8z"/></svg>
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 1.8l3.09 6.27 6.92 1.01-5.01 4.88 1.18 6.9L12 17.6l-6.18 3.26 1.18-6.9-5.01-4.88 6.92-1.01L12 1.8z"/></svg>
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 1.8l3.09 6.27 6.92 1.01-5.01 4.88 1.18 6.9L12 17.6l-6.18 3.26 1.18-6.9-5.01-4.88 6.92-1.01L12 1.8z"/></svg>
          </div>
          <div class="yr-source">Яндекс Карты</div>
          <div class="yr-reviews"><span><span data-yr-reviews>1 248</span> отзывов</span></div>
          <div class="yr-divider" aria-hidden="true"></div>
          <span class="yr-place" data-yr-place>Samsung</span>
        </div>
      </div>
    </a>

    <script>
      (function () {
        const YANDEX_RATING_CONFIG = {
          rating: '4,8',
          reviewsCount: '1 248',
          placeName: 'Samsung',
          yandexMapsUrl: 'https://yandex.ru/maps/?text=Samsung'
        };

        const widget = document.querySelector('[data-yr-widget]');
        if (!widget) return;

        const ratingEl = widget.querySelector('[data-yr-rating]');
        const reviewsEl = widget.querySelector('[data-yr-reviews]');
        const placeEl = widget.querySelector('[data-yr-place]');
        const starsEl = widget.querySelector('.yr-stars');

        widget.href = YANDEX_RATING_CONFIG.yandexMapsUrl;
        if (ratingEl) ratingEl.textContent = YANDEX_RATING_CONFIG.rating;
        if (reviewsEl) reviewsEl.textContent = YANDEX_RATING_CONFIG.reviewsCount;
        if (placeEl) placeEl.textContent = YANDEX_RATING_CONFIG.placeName;
        if (starsEl) starsEl.setAttribute('aria-label', 'Рейтинг ' + YANDEX_RATING_CONFIG.rating + ' из 5');
      })();
    </script>
    <!-- Конец кода виджета "Рейтинг на Яндекс Картах" -->
  </main>
</body>
</html>
