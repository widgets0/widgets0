<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Рейтинг на Яндекс Картах</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at 50% 28%, rgba(20, 92, 255, 0.35), transparent 28%),
        radial-gradient(circle at 50% 52%, rgba(255, 255, 255, 0.12), transparent 38%),
        linear-gradient(180deg, #060913 0%, #111827 48%, #03050a 100%);
      color: #f8fbff;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }

    .yr-demo-page {
      width: min(100%, 860px);
      min-height: 620px;
      display: grid;
      place-items: center;
      padding: clamp(20px, 5vw, 56px);
      background:
        linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px),
        linear-gradient(180deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 42px 42px;
    }

    .yr-widget {
      --yr-blue: #156cff;
      --yr-blue-light: #5ea2ff;
      --yr-dark: #111827;
      --yr-gold: #ffc83d;
      --yr-panel: rgba(226, 234, 245, 0.84);
      width: min(100%, 430px);
      display: block;
      color: inherit;
      text-decoration: none;
      outline: none;
      filter: drop-shadow(0 0 34px rgba(21, 108, 255, 0.36));
    }

    .yr-badge {
      position: relative;
      min-height: 560px;
      display: grid;
      place-items: center;
      padding: 22px;
      border-radius: 38px;
      background:
        radial-gradient(circle at 50% 14%, rgba(94, 162, 255, 0.92), transparent 18%),
        linear-gradient(135deg, #0a48d1, var(--yr-blue) 45%, #05286f);
      clip-path: polygon(50% 0%, 92% 13%, 100% 22%, 100% 78%, 91% 87%, 50% 100%, 9% 87%, 0% 78%, 0% 22%, 8% 13%);
      box-shadow:
        inset 0 2px 0 rgba(255,255,255,0.45),
        inset 0 -12px 26px rgba(0,0,0,0.34),
        0 30px 80px rgba(0,0,0,0.36);
      transition: transform 0.22s ease, filter 0.22s ease;
    }

    .yr-widget:hover .yr-badge,
    .yr-widget:focus-visible .yr-badge {
      transform: translateY(-4px) scale(1.01);
      filter: brightness(1.06);
    }

    .yr-badge::before {
      content: "";
      position: absolute;
      inset: 14px;
      border-radius: 30px;
      clip-path: inherit;
      background:
        radial-gradient(circle at 50% 8%, rgba(255,255,255,0.86), transparent 22%),
        linear-gradient(180deg, rgba(255,255,255,0.9), rgba(207, 219, 235, 0.78) 45%, rgba(240, 245, 252, 0.86));
      box-shadow:
        inset 0 0 0 3px rgba(255,255,255,0.62),
        inset 0 0 42px rgba(21, 108, 255, 0.24);
    }

    .yr-badge::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 38px;
      clip-path: inherit;
      background:
        linear-gradient(110deg, transparent 0 28%, rgba(255,255,255,0.24) 34%, transparent 42%),
        radial-gradient(circle at 50% 38%, rgba(21,108,255,0.28), transparent 38%);
      opacity: 0.72;
      pointer-events: none;
    }

    .yr-content {
      position: relative;
      z-index: 2;
      width: 100%;
      display: grid;
      justify-items: center;
      text-align: center;
      padding: 22px 18px 18px;
    }

    .yr-logo {
      width: 154px;
      min-height: 72px;
      display: grid;
      place-items: center;
      margin-bottom: 28px;
      border-radius: 26px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.96), rgba(236,243,255,0.88));
      border: 2px solid rgba(94, 162, 255, 0.42);
      box-shadow:
        0 0 0 8px rgba(21,108,255,0.14),
        0 16px 34px rgba(21,108,255,0.22);
    }

    .yr-logo span {
      display: inline-block;
      padding: 9px 14px;
      border-radius: 999px;
      background: #073da8;
      color: #ffffff;
      font-size: 17px;
      line-height: 1;
      font-weight: 950;
      letter-spacing: 0.08em;
      transform: skew(-9deg);
    }

    .yr-rating {
      margin: 0;
      color: #121820;
      font-size: clamp(74px, 18vw, 108px);
      line-height: 0.82;
      font-weight: 950;
      letter-spacing: -0.06em;
      text-shadow:
        0 2px 0 rgba(255,255,255,0.32),
        0 12px 22px rgba(0,0,0,0.18);
    }

    .yr-stars {
      display: flex;
      justify-content: center;
      gap: 5px;
      margin: 30px 0 22px;
      color: var(--yr-gold);
      filter:
        drop-shadow(0 0 10px rgba(255, 200, 61, 0.54))
        drop-shadow(0 8px 16px rgba(0,0,0,0.18));
    }

    .yr-stars svg {
      width: clamp(36px, 9vw, 48px);
      height: clamp(36px, 9vw, 48px);
      flex: 0 0 auto;
    }

    .yr-source {
      color: #111827;
      font-size: clamp(30px, 8vw, 44px);
      line-height: 1.05;
      font-weight: 900;
      letter-spacing: -0.04em;
      text-shadow:
        0 2px 0 rgba(255,255,255,0.35),
        0 10px 20px rgba(0,0,0,0.16);
    }

    .yr-reviews {
      display: grid;
      grid-template-columns: 44px auto 44px;
      gap: 13px;
      align-items: center;
      margin: 18px 0 30px;
      color: #67717f;
      font-size: clamp(21px, 5.4vw, 30px);
      line-height: 1;
      font-weight: 850;
      letter-spacing: 0.04em;
    }

    .yr-reviews::before,
    .yr-reviews::after {
      content: "";
      height: 3px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, rgba(103,113,127,0.45));
    }

    .yr-reviews::after {
      background: linear-gradient(90deg, rgba(103,113,127,0.45), transparent);
    }

    .yr-place {
      width: min(100%, 310px);
      display: block;
      padding: 15px 18px;
      border-radius: 22px;
      border: 2px solid rgba(94, 162, 255, 0.48);
      background: linear-gradient(180deg, #eff6ff, #dceaff);
      color: #073da8;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.85),
        0 10px 0 rgba(7, 61, 168, 0.2),
        0 18px 32px rgba(21,108,255,0.2);
      font-size: clamp(16px, 4.4vw, 23px);
      line-height: 1.1;
      font-weight: 950;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .yr-click-hint {
      margin-top: 18px;
      color: rgba(255,255,255,0.78);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    @media (max-width: 520px) {
      body {
        padding: 16px;
      }

      .yr-demo-page {
        min-height: 560px;
        padding: 10px;
      }

      .yr-badge {
        min-height: 520px;
      }

      .yr-logo {
        margin-bottom: 24px;
      }
    }
  </style>
</head>
<body>
  <main class="yr-demo-page">
    <!-- Начало кода виджета "Рейтинг на Яндекс Картах" -->
    <a class="yr-widget" href="https://yandex.ru/maps/?text=Samsung%20Store" target="_blank" rel="noopener" data-yr-widget>
      <div class="yr-badge">
        <div class="yr-content">
          <div class="yr-logo" aria-label="Samsung"><span>SAMSUNG</span></div>
          <p class="yr-rating" data-yr-rating>4,8</p>
          <div class="yr-stars" aria-label="Рейтинг 4,8 из 5">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 1.8l3.09 6.27 6.92 1.01-5.01 4.88 1.18 6.9L12 17.6l-6.18 3.26 1.18-6.9-5.01-4.88 6.92-1.01L12 1.8z"/></svg>
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 1.8l3.09 6.27 6.92 1.01-5.01 4.88 1.18 6.9L12 17.6l-6.18 3.26 1.18-6.9-5.01-4.88 6.92-1.01L12 1.8z"/></svg>
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 1.8l3.09 6.27 6.92 1.01-5.01 4.88 1.18 6.9L12 17.6l-6.18 3.26 1.18-6.9-5.01-4.88 6.92-1.01L12 1.8z"/></svg>
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 1.8l3.09 6.27 6.92 1.01-5.01 4.88 1.18 6.9L12 17.6l-6.18 3.26 1.18-6.9-5.01-4.88 6.92-1.01L12 1.8z"/></svg>
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 1.8l3.09 6.27 6.92 1.01-5.01 4.88 1.18 6.9L12 17.6l-6.18 3.26 1.18-6.9-5.01-4.88 6.92-1.01L12 1.8z"/></svg>
          </div>
          <div class="yr-source">Яндекс Карты</div>
          <div class="yr-reviews"><span><span data-yr-reviews>1 248</span> отзывов</span></div>
          <span class="yr-place" data-yr-place>Samsung Store</span>
          <span class="yr-click-hint">Открыть отзывы</span>
        </div>
      </div>
    </a>

    <script>
      (function () {
        const YANDEX_RATING_CONFIG = {
          rating: '4,8',
          reviewsCount: '1 248',
          placeName: 'Samsung Store',
          yandexMapsUrl: 'https://yandex.ru/maps/?text=Samsung%20Store'
        };

        const widget = document.querySelector('[data-yr-widget]');
        if (!widget) return;

        const ratingEl = widget.querySelector('[data-yr-rating]');
        const reviewsEl = widget.querySelector('[data-yr-reviews]');
        const placeEl = widget.querySelector('[data-yr-place]');
        const starsEl = widget.querySelector('.yr-stars');

        widget.href = YANDEX_RATING_CONFIG.yandexMapsUrl;
        if (ratingEl) ratingEl.textContent = YANDEX_RATING_CONFIG.rating;
        if (reviewsEl) reviewsEl.textContent = YANDEX_RATING_CONFIG.reviewsCount;
        if (placeEl) placeEl.textContent = YANDEX_RATING_CONFIG.placeName;
        if (starsEl) starsEl.setAttribute('aria-label', 'Рейтинг ' + YANDEX_RATING_CONFIG.rating + ' из 5');
      })();
    </script>
    <!-- Конец кода виджета "Рейтинг на Яндекс Картах" -->
  </main>
</body>
</html>
