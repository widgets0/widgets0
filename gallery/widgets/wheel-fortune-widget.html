<script>
// === НАСТРОЙКИ ПОВЕДЕНИЯ ВИДЖЕТА ===
// Меняйте только этот блок, если нужно настроить, когда и где показывать колесо.
window.WHEEL_WIDGET_BEHAVIOR_CONFIG = {
    // Через сколько секунд после загрузки страницы показать виджет.
    // Пример: 0 - сразу, 2 - через 2 секунды, 10 - через 10 секунд.
    appearanceDelaySeconds: 0,

    // Как часто показывать виджет одному пользователю.
    // Варианты:
    // 'always' - показывать всегда;
    // 'once_per_hour' - показывать не чаще одного раза в час;
    // 'once_per_day' - показывать не чаще одного раза в день;
    // 'custom' - использовать customFrequencyHours ниже.
    showFrequency: 'always',

    // Используется только если showFrequency: 'custom'.
    // Например: 6 - показывать не чаще одного раза в 6 часов.
    customFrequencyHours: 24,

    // Позиция на десктопе.
    // Варианты: 'center' - по центру страницы, 'bottom-left' - слева снизу, 'bottom-right' - справа снизу.
    desktopPosition: 'center',

    // Ключ localStorage для запоминания последнего показа.
    // Обычно менять не нужно. Меняйте только если на одной странице стоит несколько таких колес.
    displayStorageKey: 'wheel_fortune_widget_last_shown_at'
};
</script>

        <svg class="nbk-comic-star nbk-star-2" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M50 0L61 39L100 50L61 61L50 100L39 61L0 50L39 39L50 0Z" fill="#FACC15" stroke="#111111" stroke-width="6" stroke-linejoin="round"/></svg>

                        <path d="M30 80 L8 35 C0 20 8 2 30 2 C52 2 60 20 52 35 Z" fill="#FACC15" stroke="#111" stroke-width="5" stroke-linejoin="round"/>
                        <circle cx="30" cy="24" r="10" fill="#111" stroke="#111" stroke-width="5"/>
                    </svg>
                    <canvas id="nbk-wof-canvas" width="1000" height="1000" style="transform: rotate(0deg);"></canvas>

            </div>

            <div class="nbk-wof-content-wrapper" id="nbk-wof-dynamic-content"></div>

<script>
(function() {
    document.addEventListener("DOMContentLoaded", function() {
        const prizes = ["Скидка\n20%", "Подарок", "Скидка\n10%", "Бесплатный\nГайд", "Мини\nКурс", "Скрытый\nПриз"];
        const colors = ["#FFFFFF", "#FACC15", "#60A5FA", "#FFFFFF", "#FACC15", "#60A5FA"];

        const canvas = document.getElementById('nbk-wof-canvas');
        const contentArea = document.getElementById('nbk-wof-dynamic-content');
        const widgetContainer = document.querySelector('.nbk-wof-inline-container');

        if(!canvas) return;
        const ctx = canvas.getContext('2d');
        if(!ctx) return;

        const STORAGE_KEY = 'isolated_inline_wof_v3';
        const params = new URLSearchParams(window.location.search);
        const isPreview = params.get('preview') === '1';
        const BEHAVIOR_CONFIG = Object.assign({
            appearanceDelaySeconds: 0,
            showFrequency: 'always',
            customFrequencyHours: 24,
            desktopPosition: 'center',
            displayStorageKey: 'wheel_fortune_widget_last_shown_at'
        }, window.WHEEL_WIDGET_BEHAVIOR_CONFIG || {});
        const LEAD_CONFIG = Object.assign({
            webhookUrl: 'https://widgets0-production.up.railway.app',
            source: 'Демо-витрина виджетов',
            telegramBotToken: '',
            telegramChatId: '',
            storageKey: 'widget_leads'
        }, window.WIDGET_LEAD_CONFIG || {});
        if (params.get('webhookUrl')) {
            LEAD_CONFIG.webhookUrl = params.get('webhookUrl');
        }
        if (params.get('source')) {
            LEAD_CONFIG.source = params.get('source');
        }

        function getDisplayFrequencyMs() {
            const hourMs = 60 * 60 * 1000;
            if (BEHAVIOR_CONFIG.showFrequency === 'once_per_hour') return hourMs;
            if (BEHAVIOR_CONFIG.showFrequency === 'once_per_day') return 24 * hourMs;
            if (BEHAVIOR_CONFIG.showFrequency === 'custom') {
                const hours = Number(BEHAVIOR_CONFIG.customFrequencyHours);
                return Math.max(0, Number.isFinite(hours) ? hours : 24) * hourMs;
            }
            return 0;
        }

        function canShowWidgetNow() {
            if (isPreview || BEHAVIOR_CONFIG.showFrequency === 'always') return true;
            const frequencyMs = getDisplayFrequencyMs();
            if (!frequencyMs) return true;

            const lastShownAt = Number(localStorage.getItem(BEHAVIOR_CONFIG.displayStorageKey) || 0);
            return !lastShownAt || Date.now() - lastShownAt >= frequencyMs;
        }

        function rememberWidgetShown() {
            if (isPreview || BEHAVIOR_CONFIG.showFrequency === 'always') return;
            localStorage.setItem(BEHAVIOR_CONFIG.displayStorageKey, String(Date.now()));
        }

        function applyWidgetPosition() {
            if (!widgetContainer) return;
            widgetContainer.classList.remove('nbk-wof-pos-center', 'nbk-wof-pos-bottom-left', 'nbk-wof-pos-bottom-right');

            const position = ['center', 'bottom-left', 'bottom-right'].includes(BEHAVIOR_CONFIG.desktopPosition)
                ? BEHAVIOR_CONFIG.desktopPosition
                : 'center';

            widgetContainer.classList.add('nbk-wof-pos-' + position);
        }

        function scheduleWidgetAppearance() {
            if (!widgetContainer) return true;
            applyWidgetPosition();

            if (!canShowWidgetNow()) {
                widgetContainer.style.display = 'none';
                return false;
            }

            const delaySeconds = Math.max(0, Number(BEHAVIOR_CONFIG.appearanceDelaySeconds) || 0);
            const delayMs = isPreview ? 0 : delaySeconds * 1000;

            window.setTimeout(() => {
                widgetContainer.classList.add('nbk-wof-visible');
                rememberWidgetShown();
            }, delayMs);

            return true;
        }

        if (!scheduleWidgetAppearance()) return;

        let step = 'spin';
        let isSpinning = false;
        let rotation = 0;
        let selectedPrize = null;

        if (!isPreview && localStorage.getItem(STORAGE_KEY)) {
            selectedPrize = localStorage.getItem(STORAGE_KEY + '_prize');
            step = 'success';
        }

        function drawWheel() {
            const num = prizes.length;
            const arc = (2 * Math.PI) / num;
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const r = (canvas.width / 2) - 40;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.beginPath();
            ctx.arc(cx, cy, r + 24, 0, 2 * Math.PI);
            ctx.fillStyle = "#FACC15";
            ctx.fill();
            ctx.lineWidth = 12;
            ctx.strokeStyle = "#111111";
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, 2 * Math.PI);
            ctx.lineWidth = 10;
            ctx.stroke();

            for(let i = 0; i < num; i++) {
                const ang = i * arc;
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.arc(cx, cy, r, ang, ang + arc);
                ctx.fillStyle = colors[i % colors.length];
                ctx.fill();

                ctx.lineWidth = 8;
                ctx.strokeStyle = "#111111";
                ctx.stroke();

                ctx.save();
                ctx.translate(cx, cy);
                ctx.rotate(ang + arc / 2);
                ctx.textAlign = "right";
                ctx.textBaseline = "middle";
                ctx.font = "900 60px 'Montserrat', sans-serif";

                const lines = prizes[i].split('\n');
                const lineHeight = 65;
                const startY = -((lines.length - 1) * lineHeight) / 2;

                lines.forEach((line, index) => {
                    const yPos = startY + (index * lineHeight);
                    const xPos = r - 55;
                    ctx.fillStyle = "#111111";
                    ctx.fillText(line, xPos, yPos);
                });
                ctx.restore();
            }

            ctx.beginPath();
            ctx.arc(cx, cy, 65, 0, 2 * Math.PI);
            ctx.fillStyle = "#FACC15";
            ctx.fill();
            ctx.lineWidth = 10;
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(cx, cy, 30, 0, 2 * Math.PI);
            ctx.fillStyle = "#111111";
            ctx.fill();
            ctx.lineWidth = 6;
            ctx.stroke();
        }

        function fireConfetti() {
            if(typeof confetti === 'undefined') return;
            const duration = 2500;
            const end = Date.now() + duration;
            const confettiColors = ['#FACC15', '#60A5FA', '#FFFFFF', '#2563EB'];
            const widgetBounds = document.getElementById('nbk-wof-wrapper').getBoundingClientRect();
            const originY = (widgetBounds.top + widgetBounds.height / 2) / window.innerHeight;

            (function frame() {
                confetti({ particleCount: 5, angle: 60, spread: 60, origin: { x: 0.1, y: originY }, colors: confettiColors, zIndex: 9999 });
                confetti({ particleCount: 5, angle: 120, spread: 60, origin: { x: 0.9, y: originY }, colors: confettiColors, zIndex: 9999 });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }

        function formatLeadMessage(lead) {
            return [
                'Новая заявка',
                lead.source ? 'Источник: ' + lead.source : '',
                'Виджет: ' + lead.widget,
                lead.name ? 'Имя: ' + lead.name : '',
                lead.phone ? 'Телефон: ' + lead.phone : '',
                lead.prize ? 'Приз: ' + lead.prize : '',
                'Страница: ' + lead.page,
                'Время: ' + lead.createdAt
            ].filter(Boolean).join('\n');
        }

        async function sendWidgetLead(payload) {
            const lead = Object.assign({}, payload, {
                page: window.location.href.split('?')[0],
                createdAt: new Date().toISOString()
            });

            if (LEAD_CONFIG.webhookUrl) {
                const response = await fetch(LEAD_CONFIG.webhookUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(lead)
                });
                if (!response.ok) throw new Error('Webhook error: ' + response.status);
                return { mode: 'webhook', lead };
            }

            if (LEAD_CONFIG.telegramBotToken && LEAD_CONFIG.telegramChatId) {
                const url = 'https://api.telegram.org/bot' + LEAD_CONFIG.telegramBotToken +
                    '/sendMessage?chat_id=' + encodeURIComponent(LEAD_CONFIG.telegramChatId) +
                    '&text=' + encodeURIComponent(formatLeadMessage(lead));
                await new Promise(resolve => {
                    const img = new Image();
                    const done = () => resolve();
                    img.onload = done;
                    img.onerror = done;
                    img.src = url;
                    setTimeout(done, 2500);
                });
                return { mode: 'telegram', lead };
            }

            const leads = JSON.parse(localStorage.getItem(LEAD_CONFIG.storageKey) || '[]');
            leads.push(lead);
            localStorage.setItem(LEAD_CONFIG.storageKey, JSON.stringify(leads));
            console.info('Заявка сохранена локально. Подключите WIDGET_LEAD_CONFIG для отправки.', lead);
            return { mode: 'local', lead };
        }

        function renderContent() {
            if (step === 'spin') {
                contentArea.innerHTML = `
                    <h1 class="nbk-wof-title nbk-stagger-1">КРУТИ И ВЫИГРЫВАЙ!</h1>
                    <p class="nbk-wof-subtitle nbk-stagger-2">Испытай удачу и забери свой гарантированный бонус прямо сейчас!</p>
                    <div class="nbk-stagger-3 nbk-wof-form-container">
                        <button id="nbk-wof-spin-btn-action" type="button" ${isSpinning ? 'disabled style="opacity:0.7"' : ''}>
                            ${isSpinning ? 'ВРАЩАЕМ...' : 'КРУТИТЬ!'}
                        </button>
                    </div>
                `;
                const spinBtn = document.getElementById('nbk-wof-spin-btn-action');
                if(spinBtn) {
                    spinBtn.id = "nbk-wof-spin-btn";
                    if(!isSpinning) spinBtn.addEventListener('click', handleSpin);
                }
            } else if (step === 'form') {
                contentArea.innerHTML = `
                    <div id="nbk-wof-prize-card" class="nbk-stagger-1">
                        <div class="nbk-wof-prize-label">Твой Приз:</div>
                        <div class="nbk-wof-prize-value">${selectedPrize.replace(/\n/g, ' ')}</div>
                        <p class="nbk-wof-subtitle-dark nbk-stagger-2">Заполни форму ниже, чтобы мы отправили тебе подарок!</p>
                        <form id="nbk-wof-lead-form" class="nbk-wof-form-container nbk-stagger-3">
                            <div class="nbk-wof-input-wrapper"><input type="text" id="nbk-wof-name" placeholder="Как тебя зовут?" class="nbk-wof-input"></div>
                            <div class="nbk-wof-input-wrapper"><input type="tel" id="nbk-wof-phone" placeholder="Номер телефона" class="nbk-wof-input"></div>
                            <div id="nbk-wof-error-msg" class="nbk-wof-error-msg"></div>
                            <button type="submit" class="nbk-wof-submit-btn">ЗАБРАТЬ ПРИЗ!</button>
                        </form>
                    </div>
                `;
                document.getElementById('nbk-wof-lead-form').addEventListener('submit', handleFormSubmit);
            } else if (step === 'success') {
                contentArea.innerHTML = `
                    <div id="nbk-wof-prize-card" class="nbk-stagger-1">
                        <div class="nbk-wof-prize-label">Круто! Твой Билет:</div>
                        <div class="nbk-wof-prize-value">${selectedPrize.replace(/\n/g, ' ')}</div>
                        <p class="nbk-wof-subtitle-dark nbk-stagger-2">Менеджер свяжется с тобой и активирует бонус!</p>
                        <div class="nbk-wof-form-container nbk-stagger-3">
                            <button id="nbk-wof-copy-action" class="nbk-wof-copy-btn" type="button">
                                <span id="nbk-wof-copy-text" style="pointer-events:none">СКОПИРОВАТЬ</span>
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                            </button>
                        </div>
                        <button id="nbk-wof-reset-action" class="nbk-debug-reset nbk-stagger-3" type="button">Начать заново (Для тестов)</button>
                    </div>
                `;
                document.getElementById('nbk-wof-copy-action').addEventListener('click', handleCopy);
                document.getElementById('nbk-wof-reset-action').addEventListener('click', handleReset);
            }
        }

        function handleSpin() {
            if (isSpinning) return;
            isSpinning = true;
            renderContent();

            const spinAmount = Math.floor(2800 + Math.random() * 2000);
            rotation += spinAmount;
            canvas.style.transform = `rotate(${rotation}deg)`;

            setTimeout(() => {
                isSpinning = false;
                const degPerSector = 360 / prizes.length;
                const actualDeg = (360 - (rotation % 360) + 270) % 360;
                const index = Math.floor(actualDeg / degPerSector);

                selectedPrize = prizes[index];
                step = 'form';
                renderContent();
                fireConfetti();
            }, 5000);
        }

        async function handleFormSubmit(e) {
            e.preventDefault();
            const name = document.getElementById('nbk-wof-name').value;
            const phone = document.getElementById('nbk-wof-phone').value;
            const errorEl = document.getElementById('nbk-wof-error-msg');
            const submitBtn = e.currentTarget.querySelector('button[type="submit"]');
            const defaultText = submitBtn.innerHTML;

            if (!name.trim() || !phone.trim()) {
                errorEl.innerText = "Заполните все поля, чтобы забрать приз!";
                errorEl.style.display = 'block';
                return;
            }

            errorEl.style.display = 'none';
            submitBtn.disabled = true;
            submitBtn.innerHTML = 'ОТПРАВЛЯЕМ...';

            try {
                await sendWidgetLead({
                    widget: 'Колесо фортуны',
                    source: LEAD_CONFIG.source,
                    name,
                    phone,
                    prize: selectedPrize
                });
                localStorage.setItem(STORAGE_KEY, 'true');
                localStorage.setItem(STORAGE_KEY + '_prize', selectedPrize);
                step = 'success';
                renderContent();
            } catch (error) {
                console.error(error);
                submitBtn.disabled = false;
                submitBtn.innerHTML = defaultText;
                errorEl.innerText = "Не получилось отправить заявку. Проверьте настройки отправки и попробуйте еще раз.";
                errorEl.style.display = 'block';
            }
        }

        function handleCopy() {
            if(!selectedPrize) return;
            const btn = document.getElementById('nbk-wof-copy-action');
            const txt = document.getElementById('nbk-wof-copy-text');

            navigator.clipboard.writeText(selectedPrize.replace(/\n/g, ' ')).then(() => {
                txt.innerText = "СКОПИРОВАНО!";
                btn.style.background = "#FACC15";
                btn.style.color = "#111";
                setTimeout(() => {
                    txt.innerText = "СКОПИРОВАТЬ";
                    btn.style.background = "";
                    btn.style.color = "";
                }, 2500);
            });
        }

        function handleReset() {
            localStorage.removeItem(STORAGE_KEY);
            localStorage.removeItem(STORAGE_KEY + '_prize');
            step = 'spin';
            selectedPrize = null;
            rotation = 0;
            canvas.style.transform = `rotate(0deg)`;
            renderContent();
        }

        renderContent();

        if(document.fonts) {
            document.fonts.ready.then(drawWheel);
        } else {
            setTimeout(drawWheel, 500);
        }
    });
})();
</script>

<!-- Конец кода виджета Колесо фортуны -->
