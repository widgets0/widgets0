<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cookie-плашка</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(135deg, #f8fafc 0%, #eef2f7 100%);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #111827;
    }

    .cookie-demo-page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 34px;
    }

    .cookie-demo-card {
      width: min(100%, 560px);
      padding: 30px;
      border: 1px solid rgba(17, 24, 39, 0.08);
      border-radius: 26px;
      background: rgba(255, 255, 255, 0.58);
      box-shadow: 0 18px 60px rgba(15, 23, 42, 0.06);
    }

    .cookie-demo-card h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 4vw, 42px);
      line-height: 1;
      letter-spacing: 0;
    }

    .cookie-demo-card p {
      margin: 0;
      max-width: 430px;
      color: #64748b;
      font-size: 15px;
      line-height: 1.5;
      font-weight: 600;
    }

    .cookie-consent {
      position: fixed;
      left: 50%;
      bottom: 20px;
      z-index: 9999;
      width: min(calc(100% - 28px), 620px);
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto auto;
      gap: 10px;
      align-items: center;
      padding: 10px 10px 10px 12px;
      border: 1px solid rgba(255, 255, 255, 0.66);
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.78);
      color: #111827;
      box-shadow: 0 18px 50px rgba(15, 23, 42, 0.18);
      backdrop-filter: blur(22px) saturate(1.18);
      -webkit-backdrop-filter: blur(22px) saturate(1.18);
      transform: translate(-50%, 14px) scale(0.98);
      opacity: 0;
      pointer-events: none;
      transition: transform 0.28s ease, opacity 0.28s ease;
    }

    .cookie-consent.is-visible {
      opacity: 1;
      pointer-events: auto;
      transform: translate(-50%, 0) scale(1);
    }

    .cookie-icon {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      background: linear-gradient(135deg, #ffcf57, #ff9f0a);
      color: #5f3700;
      font-size: 18px;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.38);
    }

    .cookie-copy h2 {
      margin: 0 0 2px;
      font-size: 14px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .cookie-copy p {
      margin: 0;
      color: #667085;
      font-size: 12px;
      line-height: 1.35;
      font-weight: 600;
    }

    .cookie-actions {
      display: flex;
      align-items: center;
    }

    .cookie-btn {
      min-height: 36px;
      border: 0;
      border-radius: 999px;
      padding: 0 17px;
      font: inherit;
      font-size: 14px;
      font-weight: 850;
      cursor: pointer;
      white-space: nowrap;
      transition: transform 0.18s ease, background 0.18s ease;
    }

    .cookie-btn:hover {
      transform: translateY(-1px);
    }

    .cookie-btn-primary {
      background: #007aff;
      color: #ffffff;
      box-shadow: 0 8px 22px rgba(0, 122, 255, 0.28);
    }

    .cookie-close {
      width: 34px;
      height: 34px;
      border: 0;
      border-radius: 50%;
      background: rgba(17, 24, 39, 0.06);
      color: #667085;
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
    }

    @media (max-width: 720px) {
      .cookie-demo-page {
        padding: 22px;
      }

      .cookie-demo-card {
        padding: 24px;
      }

      .cookie-consent {
        grid-template-columns: auto 1fr auto;
        gap: 10px;
        padding: 10px;
        bottom: 12px;
        border-radius: 20px;
      }

      .cookie-icon {
        width: 32px;
        height: 32px;
        border-radius: 12px;
        font-size: 17px;
      }

      .cookie-copy {
        grid-column: 2 / 3;
      }

      .cookie-copy h2 {
        font-size: 14px;
      }

      .cookie-copy p {
        font-size: 12px;
      }

      .cookie-actions {
        grid-column: 2 / 3;
        justify-self: start;
      }

      .cookie-close {
        grid-column: 3;
        grid-row: 1;
      }
    }
  </style>
</head>
<body>
  <main class="cookie-demo-page" aria-hidden="true">
    <section class="cookie-demo-card">
      <h1>Пример страницы</h1>
      <p>Куки-плашка появляется снизу, не мешает просмотру сайта и запоминает выбор посетителя.</p>
    </section>
  </main>

  <section class="cookie-consent" data-cookie-consent aria-live="polite">
    <div class="cookie-icon" aria-hidden="true">●</div>
    <div class="cookie-copy">
      <h2>Мы используем cookie</h2>
      <p>Чтобы сайт работал корректно и становился удобнее.</p>
    </div>
    <div class="cookie-actions">
      <button class="cookie-btn cookie-btn-primary" type="button" data-cookie-accept>Ок</button>
    </div>
    <button class="cookie-close" type="button" aria-label="Закрыть" data-cookie-close>×</button>
  </section>

  <script>
    (function () {
      const STORAGE_KEY = 'cookie_consent_widget_v1';
      const isPreview = new URLSearchParams(window.location.search).has('preview');
      const bar = document.querySelector('[data-cookie-consent]');
      const acceptBtn = document.querySelector('[data-cookie-accept]');
      const closeBtn = document.querySelector('[data-cookie-close]');

      function showBar() {
        bar.classList.add('is-visible');
      }

      function hideBar(saveChoice) {
        bar.classList.remove('is-visible');
        if (saveChoice) {
          localStorage.setItem(STORAGE_KEY, 'accepted');
        }
      }

      if (isPreview || localStorage.getItem(STORAGE_KEY) !== 'accepted') {
        setTimeout(showBar, isPreview ? 0 : 1200);
      }

      acceptBtn.addEventListener('click', function () {
        hideBar(true);
      });

      closeBtn.addEventListener('click', function () {
        hideBar(false);
      });

    })();
  </script>
</body>
</html>
