<body style="background-color: #e5e7eb; padding: 40px; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0;">

<!--

    ✂️ КОД ДЛЯ КОПИРОВАНИЯ (СКОПИРУЙТЕ ВСЁ НИЖЕ ЭТОЙ ЛИНИИ) ✂️

<!-- НАЧАЛО КОДА ВИДЖЕТА -->
<div id="cleaning-widget-root">
    <style>
        /* Основной контейнер виджета */
        #cleaning-widget-root {
            /* Сброс стилей для изоляции от сайта */
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            width: 100%;
            max-width: 940px; /* Ширина десктопной версии */
            margin: 0 auto;
            background: #ffffff;
            border-radius: 24px;
            position: relative;
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.1), 0 0 0 1px rgba(0,0,0,0.03);
            overflow: hidden;
            color: #1f2937;
            box-sizing: border-box;
            line-height: 1.5;
            display: flex;
            flex-direction: column;
            text-align: left;
        }

        /* Глобальный сброс внутри виджета */
        #cleaning-widget-root *, 
        #cleaning-widget-root *::before, 
        #cleaning-widget-root *::after {
            box-sizing: border-box;
        }
        
        /* Адаптив для десктопа (горизонтальный вид) */
        @media (min-width: 800px) {
            #cleaning-widget-root {
                flex-direction: row;
                align-items: stretch;
            }
        }

        /* ЛЕВАЯ КОЛОНКА: Параметры */
        .cw-main-panel {
            padding: 40px;
            flex: 1.4;
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        /* ПРАВАЯ КОЛОНКА: Итог и форма */
        .cw-sidebar-panel {
            padding: 40px;
            flex: 1;
            background-color: #f8fafc;
            border-left: 1px solid #f1f5f9;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        /* Мобильная адаптация */
        @media (max-width: 800px) {
            .cw-sidebar-panel {
                border-left: none;
                border-top: 1px solid #f1f5f9;
                padding: 30px 24px;
            }
            .cw-main-panel {
                padding: 30px 24px;
            }
        }

        /* Типографика */
        .cw-header h2 {
            margin: 0 0 8px 0 !important;
            font-size: 28px !important;
            font-weight: 800 !important;
            color: #111827 !important;
            line-height: 1.2 !important;
            letter-spacing: -0.03em;
        }

        .cw-header p {
            margin: 0 !important;
            color: #6b7280 !important;
            font-size: 15px !important;
            line-height: 1.5 !important;
        }

        /* Слайдер */
        .cw-slider-section {
            background: #fff;
        }

        .cw-label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .cw-label-title {
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #9ca3af;
        }

        .cw-value-display {
            font-size: 32px;
            font-weight: 800;
            color: #4f46e5;
            line-height: 1;
            font-feature-settings: "tnum";
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.02em;
        }

        .cw-value-unit {
            font-size: 16px;
            color: #9ca3af;
            font-weight: 600;
            margin-left: 2px;
        }

        .cw-range-wrapper {
            position: relative;
            padding: 8px 0;
        }

        input[type=range].cw-range {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
            margin: 0;
            cursor: pointer;
            padding: 0;
        }
        input[type=range].cw-range:focus {
            outline: none;
        }
        /* Track */
        input[type=range].cw-range::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            background: #e5e7eb;
            border-radius: 9999px;
            transition: background 0.2s;
        }
        input[type=range].cw-range::-moz-range-track {
            width: 100%;
            height: 6px;
            background: #e5e7eb;
            border-radius: 9999px;
        }
        /* Thumb */
        input[type=range].cw-range::-webkit-slider-thumb {
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: #4f46e5;
            cursor: grab;
            -webkit-appearance: none;
            margin-top: -9px; 
            box-shadow: 0 0 0 4px #ffffff, 0 4px 12px rgba(79, 70, 229, 0.4);
            transition: transform 0.1s, box-shadow 0.2s;
        }
        input[type=range].cw-range::-moz-range-thumb {
            height: 24px;
            width: 24px;
            border: 4px solid #ffffff;
            border-radius: 50%;
            background: #4f46e5;
            cursor: grab;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.4);
        }
        input[type=range].cw-range:active::-webkit-slider-thumb {
            transform: scale(1.1);
            cursor: grabbing;
        }

        .cw-range-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 12px;
            font-size: 12px;
            color: #9ca3af;
            font-weight: 600;
        }

        /* Опции (Галочки) */
        .cw-options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .cw-option-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px;
            border: 2px solid #f3f4f6;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            background: #fff;
            user-select: none;
            margin: 0 !important; /* Reset margin */
        }

        .cw-option-card:hover {
            border-color: #d1d5db;
            background: #f9fafb;
        }

        .cw-option-card.active {
            border-color: #4f46e5;
            background-color: #eef2ff;
        }

        .cw-option-input {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }

        .cw-option-content {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .cw-icon-box {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: #f3f4f6;
            color: #6b7280;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .cw-option-card.active .cw-icon-box {
            background: #4f46e5;
            color: #ffffff;
        }

        .cw-option-text {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .cw-option-label {
            font-weight: 600;
            font-size: 14px;
            color: #1f2937;
            line-height: 1.2;
        }
        
        .cw-option-subprice {
            font-size: 12px;
            color: #6b7280;
            font-weight: 500;
        }
        
        .cw-option-card.active .cw-option-subprice {
            color: #4338ca;
        }

        .cw-checkbox-circle {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid #d1d5db;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .cw-option-card.active .cw-checkbox-circle {
            background: #4f46e5;
            border-color: #4f46e5;
        }

        .cw-checkbox-circle svg {
            width: 12px;
            height: 12px;
            color: white;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .cw-option-card.active .cw-checkbox-circle svg {
            opacity: 1;
            transform: scale(1);
        }

        /* Правая панель */
        .cw-total-container {
            margin-bottom: 24px;
        }

        .cw-total-label {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #64748b;
            margin-bottom: 8px;
            display: block;
        }

        .cw-total-amount {
            font-size: 40px;
            font-weight: 800;
            color: #111827;
            letter-spacing: -0.02em;
            line-height: 1;
        }

        /* Форма */
        #cw-lead-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .cw-input {
            width: 100% !important;
            padding: 16px 18px !important;
            background: #ffffff !important;
            border: 1px solid #e5e7eb !important;
            border-radius: 12px !important;
            font-size: 15px !important;
            color: #111827 !important;
            margin: 0 !important;
            transition: all 0.2s;
            font-family: inherit !important;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05) !important;
            height: auto !important;
        }

        .cw-input::placeholder {
            color: #9ca3af !important;
            opacity: 1;
        }

        .cw-input:focus {
            outline: none !important;
            border-color: #4f46e5 !important;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1) !important;
        }

        .cw-consent {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            color: #64748b;
            font-size: 12px;
            line-height: 1.4;
            font-weight: 600;
        }

        .cw-consent input {
            width: 18px;
            height: 18px;
            margin: 0;
            accent-color: #4f46e5;
            flex: 0 0 auto;
        }

        .cw-btn {
            width: 100% !important;
            padding: 18px !important;
            background: #4f46e5 !important;
            color: white !important;
            border: none !important;
            border-radius: 12px !important;
            font-size: 16px !important;
            font-weight: 600 !important;
            cursor: pointer !important;
            transition: all 0.2s !important;
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2), 0 2px 4px -1px rgba(79, 70, 229, 0.1) !important;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 8px !important;
            font-family: inherit !important;
            height: auto !important;
            text-transform: none !important;
        }

        .cw-btn:hover {
            background: #4338ca !important;
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.25), 0 4px 6px -2px rgba(79, 70, 229, 0.1) !important;
        }
        
        .cw-btn:disabled {
            opacity: 0.7 !important;
            cursor: not-allowed !important;
            transform: none !important;
            box-shadow: none !important;
            background: #6366f1 !important;
        }

        /* Успех */
        .cw-success {
            text-align: center;
            display: none;
            padding: 20px 0;
            animation: cwFadeIn 0.5s ease-out;
        }
        
        .cw-success.visible {
            display: block;
        }
        
        .cw-form-container.hidden {
            display: none;
        }

        .cw-success-icon {
            width: 60px;
            height: 60px;
            background: #dcfce7;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: #16a34a;
        }

        .cw-success h3 {
            margin: 0 0 8px 0 !important;
            color: #166534 !important;
            font-size: 22px !important;
            font-weight: 700 !important;
        }

        .cw-success p {
            margin: 0 0 24px 0 !important;
            color: #15803d !important;
            font-size: 15px !important;
            line-height: 1.5 !important;
        }
        
        .cw-reset-btn {
            background: white !important;
            border: 1px solid #dcfce7 !important;
            color: #15803d !important;
            cursor: pointer !important;
            font-weight: 600 !important;
            font-size: 14px !important;
            padding: 10px 20px !important;
            border-radius: 8px !important;
            transition: all 0.2s !important;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05) !important;
            height: auto !important;
            font-family: inherit !important;
        }
        
        .cw-reset-btn:hover {
            background: #f0fdf4 !important;
            border-color: #bbf7d0 !important;
        }

        .cw-close {
            position: absolute;
            top: 14px;
            right: 14px;
            z-index: 5;
            width: 36px;
            height: 36px;
            display: grid;
            place-items: center;
            border: 0;
            border-radius: 10px;
            background: rgba(241, 245, 249, 0.92);
            color: #64748b;
            font-size: 24px;
            line-height: 1;
            cursor: pointer;
            transition: background 0.18s ease, color 0.18s ease, transform 0.18s ease;
        }

        .cw-close:hover {
            background: #e2e8f0;
            color: #0f172a;
            transform: rotate(90deg);
        }

        @media (max-width: 640px) {
            body {
                padding: 12px !important;
                align-items: flex-start !important;
                background-color: #f3f4f6 !important;
            }

            #cleaning-widget-root {
                border-radius: 18px;
                box-shadow: 0 14px 34px rgba(15, 23, 42, 0.12), 0 0 0 1px rgba(15, 23, 42, 0.04);
            }

            .cw-main-panel {
                padding: 22px 18px 18px;
                gap: 20px;
            }

            .cw-sidebar-panel {
                padding: 18px;
            }

            .cw-header h2 {
                font-size: 24px !important;
                letter-spacing: -0.02em;
            }

            .cw-header p {
                font-size: 13px !important;
            }

            .cw-label-row {
                margin-bottom: 14px;
            }

            .cw-label-title {
                font-size: 11px;
            }

            .cw-value-display {
                font-size: 27px;
            }

            .cw-option-card {
                padding: 12px 14px;
                border-radius: 12px;
            }

            .cw-option-content {
                gap: 10px;
            }

            .cw-icon-box {
                width: 32px;
                height: 32px;
                border-radius: 9px;
            }

            .cw-option-label {
                font-size: 13px;
            }

            .cw-total-container {
                display: flex;
                align-items: baseline;
                justify-content: space-between;
                gap: 14px;
                margin-bottom: 16px;
            }

            .cw-total-label {
                margin-bottom: 0;
                font-size: 11px;
            }

            .cw-total-amount {
                font-size: 31px;
                white-space: nowrap;
            }

            .cw-input {
                padding: 13px 14px !important;
                border-radius: 10px !important;
                font-size: 14px !important;
            }

            .cw-btn {
                padding: 14px !important;
                border-radius: 10px !important;
            }

            .cw-consent {
                font-size: 11px;
            }
        }
        
        @keyframes cwFadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Спиннер */
        .cw-spinner {
            animation: cwSpin 1s linear infinite;
            height: 20px;
            width: 20px;
            display: none;
        }
        
        @keyframes cwSpin {
            from {transform: rotate(0deg);}
            to {transform: rotate(360deg);}
        }
    </style>

    <!-- ЛЕВАЯ ПАНЕЛЬ: Калькулятор -->
    <button class="cw-close" type="button" aria-label="Закрыть калькулятор" id="cw-close-action">×</button>

    <!-- ПРАВАЯ ПАНЕЛЬ: Итог и Форма -->
    <div class="cw-sidebar-panel">
        
        <div id="cw-form-block" class="cw-form-container">
            <div class="cw-total-container">
                <span class="cw-total-label">Итоговая стоимость</span>
                <div class="cw-total-amount" id="cw-total-price">0 ₽</div>
            </div>

            <form id="cw-lead-form">
                <input type="text" class="cw-input" id="cw-name" placeholder="Ваше имя" required autocomplete="name">

                <label class="cw-consent">
                    <input type="checkbox" id="cw-consent" required>
                    <span>Согласен(на) на обработку персональных данных</span>
                </label>
                <button type="submit" class="cw-btn" id="cw-submit-btn">
                    <svg class="cw-spinner" id="cw-loading-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle opacity="0.25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path opacity="0.75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <span id="cw-btn-text">Получить расчет</span>
                </button>
            </form>
        </div>

        <!-- Успех -->
        <div id="cw-success-block" class="cw-success">
            <div class="cw-success-icon">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
            </div>
            <h3>Готово!</h3>
            <p>Мы получили заявку и скоро свяжемся с вами.</p>
            <button class="cw-reset-btn" id="cw-reset-action">Рассчитать заново</button>
        </div>

    </div>

    <!-- Логика JS -->
    <script>
        (function() {
            // Константы
            const PRICE_PER_SQM = 70;
            const LEAD_CONFIG = {
                webhookUrl: 'https://widgets0-production.up.railway.app',
                webhookSecret: '',
                widget: 'Калькулятор уборки',
                source: 'cleaning-calculator'
            };
            const leadParams = new URLSearchParams(window.location.search);
            if (leadParams.get('webhookUrl')) LEAD_CONFIG.webhookUrl = leadParams.get('webhookUrl');
            if (leadParams.get('webhookSecret')) LEAD_CONFIG.webhookSecret = leadParams.get('webhookSecret');
            if (leadParams.get('source')) LEAD_CONFIG.source = leadParams.get('source');
            const pageUrl = leadParams.get('pageUrl') || document.referrer || window.location.href.split('?')[0];

            // Элементы
            const areaRange = document.getElementById('cw-area-range');
            const areaVal = document.getElementById('cw-area-val');
            const totalPriceEl = document.getElementById('cw-total-price');
            
            const checkboxes = [
                { id: 'opt-windows', card: 'card-windows' },
                { id: 'opt-deep', card: 'card-deep' },
                { id: 'opt-trash', card: 'card-trash' }
            ];

            const form = document.getElementById('cw-lead-form');
            const formBlock = document.getElementById('cw-form-block');
            const successBlock = document.getElementById('cw-success-block');
            const resetBtn = document.getElementById('cw-reset-action');
            const submitBtn = document.getElementById('cw-submit-btn');
            const btnText = document.getElementById('cw-btn-text');
            const loadingIcon = document.getElementById('cw-loading-icon');
            const phoneInput = document.getElementById('cw-phone');
            const consentInput = document.getElementById('cw-consent');
            const closeBtn = document.getElementById('cw-close-action');

            // Форматирование цены (1 200 ₽)
            function formatCurrency(num) {
                return new Intl.NumberFormat('ru-RU').format(num) + ' ₽';
            }

            // Основной расчет
            function calculate() {
                const area = parseInt(areaRange.value) || 0;
                let total = area * PRICE_PER_SQM;

                checkboxes.forEach(item => {
                    const el = document.getElementById(item.id);
                    const card = document.getElementById(item.card);
                    
                    if (el && el.checked) {
                        total += parseInt(el.value);
                        if(card) card.classList.add('active');
                    } else if (card) {
                        card.classList.remove('active');
                    }
                });

                if(areaVal) areaVal.textContent = area;
                if(totalPriceEl) totalPriceEl.textContent = formatCurrency(total);
            }

            function formatPhone(value) {
                let digits = value.replace(/\D/g, '');

                if (digits[0] === '8') {
                    digits = '7' + digits.slice(1);
                }
                if (digits[0] !== '7') {
                    digits = '7' + digits;
                }

                digits = digits.slice(0, 11);
                const rest = digits.slice(1);
                let result = '+7';

                if (rest.length > 0) result += ' (' + rest.slice(0, 3);
                if (rest.length >= 4) result += ') ' + rest.slice(3, 6);
                if (rest.length >= 7) result += '-' + rest.slice(6, 8);
                if (rest.length >= 9) result += '-' + rest.slice(8, 10);

                return result;
            }

            function getSelectedOptions() {
                const optionLabels = {
                    'opt-windows': 'Мытьё окон',
                    'opt-deep': 'Генеральная уборка',
                    'opt-trash': 'Вывоз мусора'
                };

                return checkboxes
                    .filter(item => {
                        const el = document.getElementById(item.id);
                        return el && el.checked;
                    })
                    .map(item => optionLabels[item.id] || item.id);
            }

            // Слушатели событий
            if(areaRange) {
                areaRange.addEventListener('input', calculate);
            }

            checkboxes.forEach(item => {
                const el = document.getElementById(item.id);
                if(el) {
                    el.addEventListener('change', calculate);
                }
            });

            if(phoneInput) {
                phoneInput.addEventListener('focus', function() {
                    if (!phoneInput.value) phoneInput.value = '+7';
                });

                phoneInput.addEventListener('input', function() {
                    phoneInput.value = formatPhone(phoneInput.value);
                });
            }

            // Отправка формы
            if(form) {
                form.addEventListener('submit', async function(e) {
                    e.preventDefault();
                    const name = document.getElementById('cw-name').value.trim();
                    const phone = phoneInput ? phoneInput.value : '';
                    const phoneDigits = phone.replace(/\D/g, '');
                    const selectedOptions = getSelectedOptions();

                    if (!name || phoneDigits.length !== 11) {
                        alert('Пожалуйста, укажите имя и полный телефон.');
                        return;
                    }

                    if (consentInput && !consentInput.checked) {
                        alert('Нужно согласие на обработку персональных данных.');
                        return;
                    }

                    if(submitBtn) submitBtn.disabled = true;
                    if(btnText) btnText.textContent = 'Обработка...';
                    if(loadingIcon) loadingIcon.style.display = 'block';

                    // Собираем данные
                    const formData = {
                        widget: LEAD_CONFIG.widget,
                        source: LEAD_CONFIG.source,
                        name: name,
                        phone: phone,
                        'Площадь': areaRange.value + ' м²',
                        'Опции': selectedOptions.length ? selectedOptions : 'Без дополнительных опций',
                        'Итоговая стоимость': totalPriceEl.textContent,
                        'Согласие на обработку персональных данных': 'Да',
                        page: pageUrl,
                        createdAt: new Date().toISOString()
                    };

                    try {
                        const response = await fetch(LEAD_CONFIG.webhookUrl, {
                            method: 'POST',
                            headers: Object.assign({ 'Content-Type': 'application/json' }, LEAD_CONFIG.webhookSecret ? { 'X-Webhook-Secret': LEAD_CONFIG.webhookSecret } : {}),
                            body: JSON.stringify(formData)
                        });

                        if (!response.ok) {
                            throw new Error('Webhook error: ' + response.status);
                        }

                        // Скрываем форму, показываем успех
                        if(formBlock) formBlock.classList.add('hidden');
                        if(successBlock) successBlock.classList.add('visible');
                    } catch (error) {
                        console.error(error);
                        alert('Не получилось отправить заявку. Попробуйте еще раз.');
                    } finally {
                        if(submitBtn) submitBtn.disabled = false;
                        if(btnText) btnText.textContent = 'Получить расчет';
                        if(loadingIcon) loadingIcon.style.display = 'none';
                    }
                });
            }

            // Кнопка сброса
            if(resetBtn) {
                resetBtn.addEventListener('click', function() {
                    if(successBlock) successBlock.classList.remove('visible');
                    if(formBlock) formBlock.classList.remove('hidden');
                    if(form) form.reset();
                    calculate(); // пересчитать сброшенные значения
                });
            }

            // Первый запуск
            if(closeBtn) {
                closeBtn.addEventListener('click', function() {
                    const root = document.getElementById('cleaning-widget-root');
                    if(root) root.style.display = 'none';
                });
            }

            calculate();
        })();
    </script>
</div>
